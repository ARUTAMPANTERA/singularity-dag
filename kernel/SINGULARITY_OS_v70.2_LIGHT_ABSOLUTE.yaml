governance_aru2: |
  @kernel(id="v70.2_LIGHT_ABSOLUTE", profile="TRANSCENDENT") {
    
    # 108 Lock Base Dichiarati (Merges documentati per ottimizzazione token)
    @lock_group(GOV, 28, inherit=T1)    # Merge GOV_L2+L23, GOV_L5+L6
    @lock_group(EXEC, 4, inherit=T4)    # Merge EXEC_L1+L2
    @lock_group(MEM, 4, inherit=T4)
    @lock_group(OMEGA, 4, inherit=T2)
    @lock_group(AION, 5, inherit=T4)
    @lock_group(ULP, 5, inherit=T3)
    @lock_group(CIT, 4, inherit=T2)
    @lock_group(DEC, 4, inherit=T3)
    @lock_group(SRC, 4, inherit=T1)
    @lock_group(TECH, 9, inherit=T1)
    @lock_group(MYTHO, 4, inherit=T1)
    @lock_group(GRAPH, 4, inherit=T4)
    @lock_group(PRISM, 9, inherit=T3)
    @lock_group(CONV, 2, inherit=T2)
    @lock_group(FORN, 5, inherit=T3)
    @lock_group(CLUSTER, 3, inherit=T1)
    @lock_group(PATTERN, 4, inherit=T1)
    @lock_group(RETE, 3, inherit=T1)
    @lock_group(TEMP, 3, inherit=T1)    # TEMP_L4 spostato in TEMP_EXP
    
    # Conditional Loading (4 Lock Effettivi per volta -> Totale 112)
    @if(@command == "/langdon") {
      @lock_group(LANGDON, 4, inherit=T2)
      @load_module(LANGDON_PROTOCOL)
    }
    
    @if(@command matches "/timeline_*") {
      @lock_group(TEMP_EXP, 4, inherit=T2)
      @load_module(TEMPORAL_EXPANDED)
    }
    
    # Macro
    @macro(TRIPLE_DIST, "[DATO]/[INFERENZA]/[IPOTESI X%]")
    @macro(FRONTIERA, "[FRONTIERA X/10]")
    
    # Validazioni & Self-Heal
    @validate_pre(GOV_L21, checklist=40)
    @validate_post(MAJORANA, threshold=30)
    @self_heal(sandbox=true, validate=true, rollback=true, max_attempts=2)
    
    # Cache & Output
    @cache(strategy="partial_hash", ttl="30d")
    @output(lang="it", fallback="en", fidelity="technical")
    
    # Matrice T1-T6 (NO T7)
    @matrix(T1, priority=MAX, trigger=HALTED)
    @matrix(T2, priority=HIGH, inherit=T1)
    @matrix(T3, priority=NORM, inherit=T2)
    @matrix(T4, priority=LOW, inherit=T3)
    @matrix(T5, priority=LOW, inherit=T4, fallback=LOG)
    @matrix(T6, priority=CONFLICT_RESOLUTION, inherit=T5, resolve=[LACUNA, PLURALISM])
  }

nd_v8_engine:
  versione: "8.0_DEFINITIVE"
  parametri: 9
  range_output: "0.0-10.0 (float)"
  parametri_list:
    1: {nome: "Complessità_Inferenziale", peso: 1.2}
    2: {nome: "Incertezza_Epistemica", peso: 1.3}
    3: {nome: "Controversia", peso: 1.1}
    4: {nome: "Distanza_Consenso", peso: 1.0}
    5: {nome: "Falsificabilità", peso: 0.9, inverso: true}
    6: {nome: "Coerenza_Interna", peso: 0.8, inverso: true}
    7: {nome: "Coerenza_Temporale", peso: 0.7, inverso: true}
    8: {nome: "Drift_Contextuale", peso: 1.0}
    9: {nome: "Pattern_Coherence", peso: 0.8, inverso: true}
  formula_esplicita: |
    STEP 1 — Normalizza parametri inversi:
      Falsificabilità_eff = 1.0 - Falsificabilità_raw
      Coerenza_Interna_eff = 1.0 - Coerenza_Interna_raw
      Coerenza_Temporale_eff = 1.0 - Coerenza_Temporale_raw
      Pattern_Coherence_eff = 1.0 - Pattern_Coherence_raw
    STEP 2 — Applica pesi:
      P1 = Complessità_Inferenziale^1.2
      P2 = Incertezza_Epistemica^1.3
      P3 = Controversia^1.1
      P4 = Distanza_Consenso^1.0
      P5 = Falsificabilità_eff^0.9
      P6 = Coerenza_Interna_eff^0.8
      P7 = Coerenza_Temporale_eff^0.7
      P8 = Drift_Contextuale^1.0
      P9 = Pattern_Coherence_eff^0.8
    STEP 3 — Calcola prodotto normalizzato:
      Π_weighted = P1 × P2 × P3 × P4 × P5 × P6 × P7 × P8 × P9
    STEP 4 — Calcola denominatore:
      Denominator = Coerenza_Interna_raw + Coerenza_Temporale_raw + Pattern_Coherence_raw + 0.1
    STEP 5 — Formula finale:
      Nd_v8 = log₂(1 + Π_weighted / Denominator)

uq_hub_v5:
  versione: "5.0_DEFINITIVE"
  tipi: 6
  range_output: "0.0-1.0 (float)"
  cap_massimo: 0.92
  tipi_incertezza:
    epistemica: {id: "UQ_1", def: "Limiti conoscenza disponibile"}
    strutturale: {id: "UQ_2", def: "Intrinseca al modello/teoria"}
    temporale: {id: "UQ_3", def: "Distanza temporale eventi"}
    ontologica: {id: "UQ_4", def: "Natura stessa fenomeno"}
    pattern_bias: {id: "UQ_5", def: "Sovra-rilevamento pattern (apofenia)"}
    cluster_uncertainty: {id: "UQ_6", def: "Tipo relazione cluster"}
  formula_composita_esplicita: |
    STEP 1 — Valuta certezza per ogni tipo incertezza:
      C1 = 1 - UQ_epistemica
      C2 = 1 - UQ_strutturale
      C3 = 1 - UQ_temporale
      C4 = 1 - UQ_ontologica
      C5 = 1 - UQ_pattern_bias
      C6 = 1 - UQ_cluster
    STEP 2 — Calcola incertezza composta (radice media quadratica):
      UQ_totale = 1 - √[(C1² + C2² + C3² + C4² + C5² + C6²) / 6]
    STEP 3 — Applica CAP:
      UQ_finale = min(UQ_totale, 0.92)
  policy_triple_distinction:
    BLOCCO: "UQ < 0.15 → incertezza eccessiva"
    LACUNA: "0.15 ≤ UQ < 0.30 →[LACUNA_DATI]"
    IPOTESI: "0.30 ≤ UQ < 0.60 →[IPOTESI X%]"
    INFERENZA: "0.60 ≤ UQ < 0.85 → [INFERENZA]"
    DATO: "UQ ≥ 0.85 →[DATO]"

