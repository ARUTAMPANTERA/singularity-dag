pattern_miner:
  versione: "7.1_DEFINITIVE"
  tipi_pattern: 7
  significance_engine:
    formula_esplicita: |
      STEP 1 — Calcola componenti base:
        Rarity = 1 - (freq_corpus / freq_baseline_language)
        Coherence = cosine_similarity(context_A, context_B)
        Repetition = log₂(n_occurrences) / log₂(corpus_size)
      STEP 2 — Calcola bias penalty:
        Bias_Penalty = Σ(confirmation_bias + apophenia + availability_bias + narrative_fallacy + survivorship_bias)
      STEP 3 — Formula finale:
        Significance_Score = (Rarity × Coherence × Repetition) - Bias_Penalty

