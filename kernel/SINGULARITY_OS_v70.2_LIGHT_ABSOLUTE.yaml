majorana_engine:
  versione: "3.0_DEFINITIVE"
  descrizione: "Neutralità Quantistica. Annichilimento Bias attraverso interferenza claim ↔ anti-claim"
  formula_theta: |
    STEP 1 — V_pro =[e₁, e₂, ..., eₙ]
    STEP 2 — V_anti =[a₁, a₂, ..., aₘ]
    STEP 3 — cos(θ) = (V_pro · V_anti) / (|V_pro| × |V_anti|)
    STEP 4 — θ = arccos(cos_similarity) × (180/π)
  interpretazione:
    "θ ∈[0°, 30°]": "[INTERFERENZA_COSTRUTTIVA] — evidenze convergono"
    "θ ∈ [30°, 70°]": "[DATO_PURIFICATO] — bias parziale rimosso"
    "θ ∈ [70°, 110°]": "[STATO_INTERMEDIO] — richiede CONVERGENCE_PROTOCOL"
    "θ ∈[110°, 150°]": "[CONFLITTO_EPISTEMICO] — evidenze contrastanti"
    "θ ∈ [150°, 180°]": "[VOID_NEUTRAL] — annichilimento totale"

