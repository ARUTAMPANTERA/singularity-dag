# ═══════════════════════════════════════════════════════════════════
# 2. ENGINES — EPISTEMIC METRICS (EXPLICIT FORMULAS)
# ═══════════════════════════════════════════════════════════════════

engines:
  
  nd_v9:
    name: "Text Complexity & Density"
    input: "Testo T, lunghezza L, distribuzione concetti C"
    output: "Nd ∈ [0, 14]"
    
    formula_esplicita: |
      STEP 1: Segmenta T in unità semantiche (frasi/paragrafi)
      STEP 2: Estrai concetti unici C e relazioni R
      STEP 3: Calcola entropia H(T) su distribuzione concetti
      STEP 4: Calcola compressibilità K(T) (approssimata)
      STEP 5: Nd_raw = f(H, K, |C|, |R|)
      STEP 6: Nd = clamp(round(Nd_raw), 0, 14)
    
    interpretazione:
      "0-3": "BANALE — testo semplice, ridondante"
      "4-7": "STANDARD — complessità normale"
      "8-10": "DENSO — stratificato, non banale"
      "11-14": "ESTREMO — massima densità concettuale"
  
  uq_v6:
    name: "Uncertainty Quantification"
    input: "Claim c, fonti S, TIER, conflitti, bias_penalty"
    output: "UQ ∈ [0.0, 1.0] (1.0 = max affidabilità)"
    
    formula_esplicita: |
      STEP 1: Assegna peso w_tier per ogni fonte
        TIER_0: 1.0 (reperto fisico, fonte primaria diretta)
        TIER_1: 0.8 (fonte primaria secondaria)
        TIER_2: 0.5 (fonte secondaria accademica)
        TIER_3: 0.3 (fonte terziaria, tradizione orale)
      
      STEP 2: Calcola supporto
        S_support = Σ w_tier / max_support
      
      STEP 3: Calcola conflict_penalty
        conflict_penalty = n_conflitti / (n_fonti + n_conflitti)
      
      STEP 4: Calcola bias_penalty
        bias_penalty = omogeneità_fonti × 0.3
      
      STEP 5: UQ finale
        UQ_raw = S_support × (1 - conflict_penalty) × (1 - bias_penalty)
        UQ = clamp(UQ_raw, 0.0, 1.0)
    
    policy_triple_distinction:
      "UQ < 0.15": "BLOCCO"
      "0.15 ≤ UQ < 0.30": "[LACUNA_DATI]"
      "0.30 ≤ UQ < 0.60": "[IPOTESI X%]"
      "0.60 ≤ UQ < 0.85": "[INFERENZA]"
      "UQ ≥ 0.85": "[DATO]"
  
  majorana_theta_v4:
    name: "Version Divergence Angle"
    input: "Due versioni A, B"
    output: "θ ∈ [0°, 180°]"
    
    formula_esplicita: |
      STEP 1: Rappresenta A e B come vettori feature F
        F = [lock_attivi, formule, policy, token, quality_score, ...]
      
      STEP 2: Normalizza vettori
        A_norm = A / ||A||
        B_norm = B / ||B||
      
      STEP 3: Cosine similarity
        cos_sim = (A_norm · B_norm)
      
      STEP 4: Angolo
        θ = arccos(cos_sim) × 180/π
    
    interpretazione:
      "θ ≈ 0°": "Quasi identici"
      "θ ≤ 30°": "[INTERFERENZA_COSTRUTTIVA]"
      "30° < θ ≤ 60°": "[STATO_INTERMEDIO] — trade-offs"
      "θ > 60°": "Divergenza forte"
      "θ ≈ 180°": "[VOID_NEUTRAL] — annichilimento"
  
  agnotology_si_v3:
    name: "Suppression Index"
    input: "Cluster factoid, pattern omissione"
    output: "SI ∈ [0.0, 1.0]"
    
    formula_esplicita: |
      STEP 1: Identifica cluster tematico
      STEP 2: Confronta presenza in TIER_0/1 vs TIER_2/3
      STEP 3: Calcola gap copertura
        gap = (expected_coverage - actual_coverage) / expected_coverage
      STEP 4: Calcola coerenza narrativa
        narrativa_score = omogeneità_narrazioni
      STEP 5: SI finale
        SI_raw = gap × narrativa_score
        SI = clamp(SI_raw, 0.0, 1.0)
    
    interpretazione:
      "SI < 0.3": "Pattern normale"
      "0.3 ≤ SI < 0.6": "Possibile distorsione"
      "SI ≥ 0.6": "Pattern sospetto di soppressione sistematica"
    
    warning: "SI alto NON prova complotto, ma segnala anomalia da investigare"

