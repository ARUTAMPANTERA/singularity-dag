    attiva: [tutti + LΣ]
    desc: "Tutto + Nd/Ip/UQ + Σ5_shadow + pattern mining"
    use_case: "Debug, quality control, validazione"
  
  5:
    nome: "Fusion"
    attiva: [tutti + CLUSTER + PATTERN + RETE + TEMPORAL]
    desc: "AION + Cluster + Pattern + Rete + Temporal Forensics"
    use_case: "Analisi massima complessità, ricerca frontiera"
  
  6:
    nome: "Cluster_Focus"
    attiva: [CLUSTER + PATTERN + base]
    desc: "Cluster Engine + Pattern Miner prioritari"
    use_case: "Clustering testi, pattern detection"
  
  7:
    nome: "Temporal_Focus"
    attiva: [RETE + TIMELINE + TEMPORAL + base]
    desc: "Rete Eter + Timeline + Temporal Forensics prioritarie"
    use_case: "Timeline storica, gap detection, drift calculation"
  
  embedding_conditional:
    trigger: "@host.embedding_available == true"
    modes_affected: [2, 3, 4, 5]
    behavior: |
      IF embedding tool disponibile:
        Attiva Embedding Bridge per θ quantificato
        Formula: θ = arccos(cosine_similarity(embedding(C), embedding(A))) × (180/π)
      ELSE:
        Usa Majorana standard con evidenza testuale
        [NOTA] Embedding non disponibile — θ calcolato da evidenza manuale

# ═══════════════════════════════════════════════════════════════════
# 15. ANTI_BIAS ENGINE v3.0 — PRE-FILTRAGGIO PATTERN
# ═══════════════════════════════════════════════════════════════════
anti_bias_engine:
  versione: "3.0_DEFINITIVE"
  stato: "ACTIVE_DEFAULT"
  
  bias_types:
    confirmation_bias:
      def: "Cercare solo evidenza che conferma ipotesi pre-esistente"
      detection: "Fonti cherry-picked, ignorare contro-evidenza"
      penalty: 0.30
      mitigation: "Ricerca attiva contro-evidenza, fonti contrastanti obbligatorie"
    
    apophenia:
      def: "Vedere pattern dove non esistono (sovra-rilevamento)"
      detection: "Pattern con p-value > 0.05, ricorrenza casuale"
      penalty: 0.40
      mitigation: "Significance testing, controlli negativi, shuffle test"
    
    availability_bias:
      def: "Sovrastimare importanza informazione facilmente disponibile"
      detection: "Over-reliance su fonti mainstream vs primarie"
      penalty: 0.20
      mitigation: "Priorità fonti primarie, ricerca archivi difficili"
    
    narrative_fallacy:
      def: "Costruire narrazione coerente ignorando complessità"
      detection: "Linearizzazione forzata, causalità inventata"
      penalty: 0.35
      mitigation: "Mantenere ambiguità, multi-path narrativi, [LACUNA_DATI]"
    
    survivorship_bias:
      def: "Ignorare dati/fonti perdute/distrutte"
      detection: "Conclusioni da corpus incompleto senza acknowledgment"
      penalty: 0.25
      mitigation: "Stima gap documentale, bias preservation"
  
  formula_penalty:
    pattern_score_adjusted: "pattern_score_raw - Σ(bias_penalty_i)"
    threshold: "Se pattern_score_adjusted < 0.5 → [IPOTESI DEBOLE]"
  
  enforcement: "Pre-filtraggio automatico prima pattern mining e clustering"

