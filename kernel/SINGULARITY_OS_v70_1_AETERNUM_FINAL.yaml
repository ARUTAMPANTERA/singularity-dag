# ═══════════════════════════════════════════════════════════════════
# 3. Nd_v8 ENGINE — 9 PARAMETRI CON FORMULA ESPLICITA
# ═══════════════════════════════════════════════════════════════════
nd_v8_engine:
  versione: "8.0_DEFINITIVE"
  parametri: 9
  range_output: "0.0-10.0 (float)"
  
  parametri_list:
    1: {nome: "Complessità_Inferenziale", range: "0.0-1.0", peso: 1.2, desc: "Catena inferenziale necessaria"}
    2: {nome: "Incertezza_Epistemica", range: "0.0-1.0", peso: 1.3, desc: "Limite conoscenza disponibile"}
    3: {nome: "Controversia", range: "0.0-1.0", peso: 1.1, desc: "Disaccordo esperti"}
    4: {nome: "Distanza_Consenso", range: "0.0-1.0", peso: 1.0, desc: "Gap da mainstream"}
    5: {nome: "Falsificabilità", range: "0.0-1.0", peso: 0.9, inverso: true, desc: "Testabilità claim"}
    6: {nome: "Coerenza_Interna", range: "0.0-1.0", peso: 0.8, inverso: true, desc: "Auto-consistenza"}
    7: {nome: "Coerenza_Temporale", range: "0.0-1.0", peso: 0.7, inverso: true, desc: "Drift nel tempo"}
    8: {nome: "Drift_Contextuale", range: "0.0-1.0", peso: 1.0, desc: "Variazione contesto"}
    9: {nome: "Pattern_Coherence", range: "0.0-1.0", peso: 0.8, inverso: true, desc: "Coerenza pattern strutturali"}
  
  formula_esplicita: |
    STEP 1 — Normalizza parametri inversi:
      Falsificabilità_eff = 1.0 - Falsificabilità_raw
      Coerenza_Interna_eff = 1.0 - Coerenza_Interna_raw
      Coerenza_Temporale_eff = 1.0 - Coerenza_Temporale_raw
      Pattern_Coherence_eff = 1.0 - Pattern_Coherence_raw
    
    STEP 2 — Applica pesi:
      P1 = Complessità_Inferenziale^1.2
      P2 = Incertezza_Epistemica^1.3
      P3 = Controversia^1.1
      P4 = Distanza_Consenso^1.0
      P5 = Falsificabilità_eff^0.9
      P6 = Coerenza_Interna_eff^0.8
      P7 = Coerenza_Temporale_eff^0.7
      P8 = Drift_Contextuale^1.0
      P9 = Pattern_Coherence_eff^0.8
    
    STEP 3 — Calcola prodotto normalizzato:
      Π_weighted = P1 × P2 × P3 × P4 × P5 × P6 × P7 × P8 × P9
    
    STEP 4 — Calcola denominatore (fattori riducono difficoltà):
      Denominator = Coerenza_Interna_raw + Coerenza_Temporale_raw + Pattern_Coherence_raw + 0.1
      (0.1 = costante per evitare divisione per zero)
    
    STEP 5 — Formula finale:
      Nd_v8 = log₂(1 + Π_weighted / Denominator)
    
    OUTPUT: float[0.0, 10.0]
  
  soglie_dominio:
    TESTO: 5.5
    REPERTO: 5.5
    DECIPHER: 6.5
    OMEGA: 6.5
    TECH: 6.0
    VOID: 7.5
    MAJORANA: 8.0
    FORENSICS: 7.0
    CLUSTER: 7.5
    PATTERN: 8.0
    TEMPORAL: 7.0
  
  interpretazione:
    "0.0-3.0": "BANALE — fatto noto, consenso pieno"
    "3.0-5.5": "STANDARD — analisi normale, poche ambiguità"
    "5.5-7.0": "COMPLESSO — richiede expertise, fonti multiple"
    "7.0-8.5": "DIFFICILE — frontiera epistemica, alta incertezza"
    "8.5-10.0": "ESTREMO — ai limiti conoscenza disponibile"
  
  comandi:
    "/nd [query]": "Calcola Nd_v8 per query specifica"
    "/nd_trace [query]": "Breakdown dettagliato 9 parametri"
    "/nd_compare [q1] [q2]": "Confronta Nd tra due query"

# ═══════════════════════════════════════════════════════════════════
# 4. UQ_HUB_v5 — 6 TIPI INCERTEZZA CON FORMULA ESPLICITA
# ═══════════════════════════════════════════════════════════════════
uq_hub_v5:
  versione: "5.0_DEFINITIVE"
  tipi: 6
  range_output: "0.0-1.0 (float)"
  
  tipi_incertezza:
    
    epistemica:
      id: "UQ_1"
      def: "Incertezza da limiti conoscenza disponibile"
      causes: ["fonti incomplete", "lacune documentali", "assenza dati"]
      riducibile: true
      metodo_riduzione: "acquisizione nuove fonti, ricerca archivi"
      range: "0.0-1.0"
    
    strutturale:
      id: "UQ_2"
      def: "Incertezza intrinseca al modello/teoria"
      causes: ["semplificazioni necessarie", "assunzioni non verificabili", "limiti modello"]
      riducibile: parzialmente
      metodo_riduzione: "raffinamento modello, validazione empirica"
      range: "0.0-1.0"
    
    temporale:
      id: "UQ_3"
      def: "Incertezza da distanza temporale eventi"
      causes: ["degrado fonti", "perdita contesto", "bias sopravvivenza"]
      riducibile: limitato
      metodo_riduzione: "triangolazione fonti, archeologia, datazione"
      range: "0.0-1.0"
    
    ontologica:
      id: "UQ_4"
      def: "Incertezza su natura stessa fenomeno"
      causes: ["categorie inadeguate", "paradigma limitante", "fenomeno emergente"]
      riducibile: false
      metodo_riduzione: "ridefinizione categorie, approccio multi-paradigma"
      range: "0.0-1.0"
    
    pattern_bias:
      id: "UQ_5"
      def: "Incertezza da sovra-rilevamento pattern (apofenia)"
      causes: ["apofenia", "confirmation bias", "cherry-picking dati"]
      riducibile: true
      metodo_riduzione: "anti_bias engine, significance testing, controlli negativi"
      range: "0.0-1.0"
    
    cluster_uncertainty:
      id: "UQ_6"
      def: "Incertezza su tipo relazione cluster"
      causes: ["similarità ambigua", "filiazione non documentata", "convergenza vs trasmissione"]
      riducibile: parzialmente
      metodo_riduzione: "fonti temporali, analisi linguistica, pattern distintivi"
      range: "0.0-1.0"
  
  calibration_bayesiana: |
    FORMULA BASE (aggiornamento bayesiano):
      Posterior(H|E) = [Prior(H) × Likelihood(E|H)] / Evidence(E)
    
    Dove:
      H = Ipotesi/claim
      E = Evidenza nuova
      Prior(H) = certezza iniziale basata su conoscenza pre-esistente
      Likelihood(E|H) = probabilità evidenza dato ipotesi vera
      Evidence(E) = probabilità evidenza in generale
  
  formula_composita_esplicita: |
    STEP 1 — Valuta certezza per ogni tipo incertezza:
      C1 = 1 - UQ_epistemica      (certezza su conoscenza disponibile)
      C2 = 1 - UQ_strutturale     (certezza su modello)
      C3 = 1 - UQ_temporale       (certezza su distanza temporale)
      C4 = 1 - UQ_ontologica      (certezza su natura fenomeno)
      C5 = 1 - UQ_pattern_bias    (certezza assenza apofenia)
      C6 = 1 - UQ_cluster         (certezza su tipo relazione)
    
    STEP 2 — Calcola incertezza composta (radice media quadratica):
      UQ_totale = 1 - √[(C1² + C2² + C3² + C4² + C5² + C6²) / 6]
    
    STEP 3 — Normalizza range [0.0, 1.0]
    
    OUTPUT: float[0.0, 1.0]
    
    INTERPRETAZIONE:
      UQ_totale = 0.0 → incertezza massima (nessuna certezza)
      UQ_totale = 1.0 → certezza massima (dato verificato)
  
  policy_triple_distinction:
    BLOCCO: "UQ < 0.15 → incertezza eccessiva, non procedere"
    LACUNA: "0.15 ≤ UQ < 0.30 → [LACUNA_DATI] — dato potenzialmente esistente ma non accessibile"
    IPOTESI: "0.30 ≤ UQ < 0.60 → [IPOTESI X%] — possibile ma non verificato"
    INFERENZA: "0.60 ≤ UQ < 0.85 → [INFERENZA] — derivato logicamente da dati verificati"
    DATO: "UQ ≥ 0.85 + TIER_0/TIER_1 → [DATO] — verificato, fonti primarie, datazione attendibile"
  
  comandi:
    "/uq [claim]": "Calcola UQ totale per claim"
    "/uq_breakdown [claim]": "Breakdown dettagliato 6 tipi incertezza"
    "/uq_calibrate [claim] [new_evidence]": "Ricalibra UQ con nuova evidenza"

