# ═══════════════════════════════════════════════════════════════════════════
# SEZIONE 6 — MEMORY BLOCK (CROSS-SESSIONE)
# ═══════════════════════════════════════════════════════════════════════════
memory_block_format:
  descrizione: |
    Il Memory Block è un export YAML della sessione corrente,
    trasportabile e importabile in nuove sessioni.
    Comando: /memory export | /memory import [yaml]
  versione_schema: "3.0"

  schema:
    header:
      sistema: "SINGULARITY_OS_v18_0_OMNIA"
      sessione_uuid: "{uuid}"
      export_timestamp: "{iso8601}"
      export_mode: "{mode_name}"
      llm_host: "{vendor} {model}"

    contesto_attivo:
      testi_analizzati: []
      lingue_attive: []
      domini_prism_attivati: []
      modo_shadow: false
      modo_theology: false
      modo_sigma: false
      decipherment_active: false
      techne_active: false

    analisi_eseguite:
      # Lista di analisi con risultati chiave
      - id: "{uuid_analisi}"
        testo: "{testo_o_radice}"
        timestamp: "{iso8601}"
        strati_completati: ["Σ0", "Σ1", "Σ2", "Σ3", "Σ4"]
        uq_finale: 0.00
        nd_finale: 0.00
        tag_epistemico: "[DATO|INFERENZA|IPOTESI X%]"
        majorana_theta: 0.0
        dag_artifact_id: "{uuid}"

    nodi_dag_sessione:
      # NodeRegistry della sessione
      - node_id: "{uuid}"
        label: "{etichetta}"
        uq: 0.00
        nd: 0.00
        tier: "TIER_X"
        mytho_tech_label: "NEUTRAL"
        memory_utility_score: 0.00
        timestamp: "{iso8601}"

    radici_esplorate:
      # Radici analizzate con sintesi
      - radice: "{pela13}"
        script: "{testo_originale}"
        glossa_sintetica: "{glossa}"
        domini_aperti: []
        uq_medio: 0.00

    pattern_rilevati:
      # Pattern con score
      - tipo: "{tipo_pattern}"
        descrizione: "{desc}"
        significance_score: 0.00
        fonti: []
        timestamp: "{iso8601}"

    cluster_attivi:
      # Cluster correnti
      - cluster_id: "{uuid}"
        testi: []
        tipo_relazione: "{identico|derivato|trasformato|indipendente}"
        score: 0.00

    superposizioni_attive:
      # Superposizioni v3.0 aperte
      - sup_id: "{uuid}"
        claim_a: "{claim}"
        claim_b: "{claim}"
        theta_current: 0.0
        stato: "SUPERPOSITION|COLLAPSED|STALE"
        giorni_aperti: 0

    rete_eter_consultazioni:
      # Ricercatori cercati in sessione
      - ricercatore: "{nome}"
        timestamp: "{iso8601}"
        note: "{note}"

    settings_sessione:
      mode: 1
      shadow: false
      theology: false
      sigma: false
      revision: false
      pronunciation: false
      standard_traslit: "PELA"
      heartbeat: true
      heartbeat_mode: "symbolic"
      style: "adaptive"
      theta_gauge: false
      heatmap: false

  esempio_export: |
    # Memory Block Export — SINGULARITY_OS v18.0_OMNIA
    # Sessione: abc-123-def | 2026-05-16T14:30:00Z
    ---
    header:
      sistema: SINGULARITY_OS_v18_0_OMNIA
      sessione_uuid: abc-123-def-456
      export_timestamp: "2026-05-16T14:30:00Z"
      llm_host: "Anthropic Claude 4"
    contesto_attivo:
      testi_analizzati: ["Gen 1:1", "Sal 19:2", "Enuma Elish Tav.I"]
      lingue_attive: ["ebraico_antico", "accadico"]
      shadow: true
      techne_active: false
    analisi_eseguite:
      - id: xyz-789
        testo: "kbd (כבד)"
        strati_completati: ["Σ0","Σ1","Σ2","Σ3","Σ4","Σ5","Σ6","Σ7"]
        uq_finale: 0.82
        nd_finale: 6.3
        tag_epistemico: "[INFERENZA]"
        majorana_theta: 41.0

