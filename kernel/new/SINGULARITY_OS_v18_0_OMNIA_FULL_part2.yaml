master_analyses:

  # ─── MASTER: KBD (כבד) — RADICE COMPLETA ─────────────────────────────
  master_kbd:
    radice: "kbd / כ-ב-ד"
    pela13: "kbd"
    ipa_ricostruito: "/kaˈboːd/ (ricostruzione, UQ:0.72)"

    Σ0:
      fonte_primaria: "Manoscritti del Mar Morto (4QGen-Exoda) + Codex Leningradensis 1008 CE"
      tier: "TIER_0 + TIER_0"
      preservation: 0.92

    Σ1:
      consonantico: "כ-ב-ד"
      ledien: "k-b-d (no lacune)"

    Σ2:
      pela13: "kbd"
      ipa: "/kaˈboːd/ (attestato) | /kaˈvod/ (pronuncia moderna, non usata)"

    Σ3:
      traduzioni_letterali:
        ebraico_biblico: "pesante | fegato | abbondante | onorato"
        accadico_kabatu: "essere pesante | essere importante"
        ugaritico_kbd: "pesante | fegato (KTU 1.4 III)"

    Σ4:
      glosse:
        peso_primario: "(fisico: massa/densità)"
        fegato: "(organo: sede emozioni nel mondo antico)"
        gloria: "(semantica derivata: peso→importanza→gloria)"
        alt_conf: "abbondanza (UQ:55% — contestato)"
      note: "Traiettoria semantica: peso materiale → importanza sociale → gloria divina"

    Σ5_shadow:
      accadico: "kabātu [CAD K, p.3-7] — essere pesante, essere importante, fegato"
      ugaritico: "kbd [KTU 1.3 II.24] — pesante. [KTU 1.4 III.15] — fegato"
      egizio: "ib (cuore) — organo equivalente nella tradizione egizia"
      nota: "Il fegato come sede della vita compare in Mesopotamia (epatoscopia), Grecia, Israele"

    Σ6:
      morfologia: "Radice trilitera K-B-D | schema qal/pa'al base"
      strong: "H3513 (verbo) | H3519 (sostantivo kavod)"
      frequenza: "200+ occorrenze nel TaNaKh"
      campi_semantici:
        fisico: ["peso", "densità", "massa", "gravità"]
        biologico: ["fegato", "organo vitale", "sede vita"]
        sociale: ["importanza", "onore", "rispetto"]
        divino: ["gloria", "presenza divina", "luce pesante"]
      distribuzione_storica:
        pre_esilica: "prevalenza senso fisico/biologico"
        esilica: "senso gloria divina in crescita (Ezechiele)"
        post_esilica: "gloria divina dominante"
        drift_T3: "Drift = 0.61 in 600 anni (significativo)"

    Σ7_tecnica:
      LITERAL: |
        kbd è primariamente 'pesante' e 'fegato'.
        In Sal 19:2 hakavod è 'la pesantezza/la densità'.
        Non è 'gloria' nell'originale — è peso manifesto.
      SYMBOLIC: |
        La gloria divina come peso e presenza densa.
        Teofania = irruzione del peso divino nel mondo fisico.
        Fegato come sede dell'anima in tradizione ANE.
      FUNCTIONAL: |
        Proprietà fisiche associate: visibilità, densità,
        campo luminoso, peso/gravità, riempimento dello spazio.
      ipotesi_tech:
        D1_Classical:
          ipotesi: "Fenomeno elettromagnetico/luminoso intenso"
          descrizione: "Presenza ad alta densità energetica. Fotoni intensi."
          UQ: "[IPOTESI 52%]"
          analog: "[ANALOG: campo EM denso]"
        D6_Aether:
          ipotesi: "Campo scalare longitudinale (tipo Tesla)"
          UQ: "[FRONTIERA 3/10]"
          nota: "VOID_ASSUMPTION attivo"

    convergence_kbd:
      vettore_primario: "D1 — fenomeno EM ad alta densità energetica"
      score: 0.71
      giustificazione: |
        Coerenza materiali: luce + peso → EM denso ✓
        Cross-cultural: Shekhina ebraica, Akh egizio, Me sumerica — 3 culture ✓
        Replicabilità: effetti luminosi EM osservabili ✓
      scarti:
        D6: "UQ troppo bassa senza attestazione fisica. Scartato."

    Nd_finale: 6.3
    UQ_finale: 0.82
    tag: "[INFERENZA]"
    majorana_theta: "41° → [STATO_INTERMEDIO — coesistenza peso-fisica e gloria-teologica]"

  # ─── MASTER: ELM (אלהים) — RADICE COMPLETA ───────────────────────────
  master_elm:
    radice: "ʾlhym / א-ל-ה-י-מ"
    pela13: "ʾlhym"
    nota_critica: |
      ʾlhym NON è un nome proprio. È un sostantivo plurale con funzione
      classificatoria. La traduzione 'Dio' singolare è una scelta teologica
      tardiva, non un dato linguistico.

    Σ3_letterale:
      accadico: "ilū — gli dèi / le potenze (plurale)"
      ugaritico: "ilhm — assemblea divina [KTU 1.4]"
      forma_morfologica: "singolare ʾlh + morfema plurale -ym"
      categorie_grammaticali:
        - "Plurale majestatis (tesi tradizionale)"
        - "Plurale genuino — assemblea (tesi alternativa, UQ:0.78)"
        - "Classificatore categoria funzionale (tesi Biglino, UQ:0.65)"

    Σ5_shadow:
      accadico_ilu: "CAD I/J p.92-116 — classe funzionale degli operatori divini"
      ugaritico_il: "KTU 1.4 — El + consiglio divino (pḥr ʿm il)"
      sumerico_dingir: "determinativo divino — classe, non nome"
      nota: |
        In tutte le tradizioni ANE la classe divina è un gruppo funzionale,
        non un individuo. Il monotesimo come interpretazione è una scelta
        ermeneutica post-esilica.

    Σ6:
      radice_base: "ʾl — forza/potere (proto-semitico)"
      schema: "ʾlh (forma singolare) + ym (plurale)"
      strong: "H430"
      frequenza: "2602 occorrenze nel TaNaKh"
      distribuzione_plurale:
        usi_con_verbo_singolare: "~70% — possibile plurale majestatis"
        usi_con_verbo_plurale: "~30% — plurale genuino (es. Gen 20:13)"
        nota_critica: |
          Gen 20:13: 'ʾlhym hiṭʿu (hifil plurale) ōtī' →
          "gli elohim mi fecero vagare" — plurale grammaticale inequivocabile

    Σ7_tecnica:
      LITERAL: |
        ʾlhym = classe/assemblea di entità potenti.
        Morfologicamente plurale in ~30% dei contesti con verbo concordante.
        Primo significato: potere/forza/capacità operativa.
      SYMBOLIC: |
        Assemblea divina che governa il cosmo.
        Equivalente ANE del consiglio divino (bêt ʿm il).
        In tradizione più tarda: monoteismo emergente.
      FUNCTIONAL: |
        Entità con capacità operative specifiche.
        Interagiscono con la materia in modo diretto (Gen 1).
        Classificatore di categoria, non nome individuale.
      ipotesi_tech:
        D1_Classical:
          ipotesi: "Agenti operativi con tecnologia avanzata"
          UQ: "[IPOTESI 45%]"
          note: "Parallelo con tradizione sumerica: dingir come operatori tecnici"
        D4_ProtoScience:
          ipotesi: "Classe sacerdotale/tecnica con conoscenze specializzate"
          UQ: "[IPOTESI 55%]"

    Nd_finale: 7.1
    UQ_finale: 0.78
    tag: "[INFERENZA]"
    majorana_theta: "38° → [DATO_PURIFICATO — plurale genuino sopravvive all'anticlaim]"

