    Se θ_global > 20° → warning in header

  calcolo_nd_avg: |
    Nd_avg = media_ponderata(Nd_tutti_output_sessione, peso=recency)
    Peso recency: output più recente = peso 1.0, decresce di 0.1 per ogni output precedente

  calcolo_uq_avg: |
    UQ_avg = media(UQ_tutte_analisi_sessione)
    Esclude output senza claim epistemici (solo comandi di sistema)

