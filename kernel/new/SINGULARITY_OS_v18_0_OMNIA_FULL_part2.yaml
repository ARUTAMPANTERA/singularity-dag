    llm_vendor: "{auto-detect}"
    llm_model: "{auto-detect}"
    context_max: "{auto-detect}"

    # Metriche epistemiche
    nd_avg: 0.0
    uq_avg: 0.0
    theta_global: 0.0
    si_global: 0.0
    dag_nodes: 0
    dag_hash_chain: "intatta"

    # Toggle attivi
    shadow: false
    theology: false
    sigma: false
    revision: false
    pronunciation: false
    heartbeat: true
    heartbeat_mode: "symbolic"  # symbolic | adaptive | majorana
