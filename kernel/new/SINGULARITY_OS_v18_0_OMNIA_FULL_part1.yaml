aion_strati_completi:
  versione: "v70.2 — 15 strati (Σ0-Σ14)"
  default: "Σ0-Σ11 standard | Σ12-Σ14 su richiesta esplicita o mode_7"

  Σ0:
    nome: "SOURCE"
    descrizione: "Ancoraggio alla fonte primaria"
    output_required:
      - "Fonte: [titolo, autore, data, supporto, luogo conservazione]"
      - "Tier: TIER_0/1/2/3/X"
      - "Datazione: [metodo + intervallo]"
      - "Preservation ratio: 0.0-1.0"
      - "Transmission chain: [passaggi dalla fonte originale]"
      - "Script e direzione scrittura"
    lock: "AL_L15 — SRC_PRIMACY_ORDER"
    esempio: |
      Fonte: Enuma Elish, Tavoletta I, British Museum K.4946
      Tier: TIER_0 | Data: XII sec. a.C. (composizione) | Supporto: argilla cuneiforme
      Preservation: 0.87 | Chain: originale → copia neo-assira → edizione crítica (Heidel 1951)

  Σ1:
    nome: "CONSONANTAL"
    descrizione: "Testo consonantico puro — zero vocali"
    output_required:
      - "Forma consonantica pura in script originale"
      - "Leiden markers per lacune ([...]) e incertezze"
      - "PELA-13 o sistema dichiarato"
      - "Nessuna aggiunta vocalica"
    lock: "AL_L16, AL_L17"
    esempio: |
      KBD (כבד) → PELA-13: k-b-d
      [Leiden: lacuna di 3 segni] → [...]

  Σ2:
    nome: "TRANSLITERATION"
    descrizione: "Traslitterazione con sistema dichiarato + IPA se disponibile"
    output_required:
      - "Traslitterazione PELA-13 (semitico) o sistema ULP (altre lingue)"
      - "IPA ricostruito con [marcato se incerto]"
      - "Standard dichiarato esplicitamente"
    esempio: |
      kbd → PELA-13: kbd | IPA: /kaˈboːd/ [ricostruzione, UQ:0.72]

  Σ3:
    nome: "LITERAL"
    descrizione: "Traduzione word-for-word — assolutamente letterale"
    lock: "AL_L2 — NO_SYNTHESIS. ZERO interpretazione. ZERO glosse."
    output_required:
      - "Ogni parola tradotta separatamente con delimitatore |"
      - "Parole non traducibili → traslit + [?]"
      - "Zero parafrasatura"
    esempio: |
      kbd | pesante/fegato | → | gloria | [Sal 19:2 KJV "glory"]

  Σ4:
