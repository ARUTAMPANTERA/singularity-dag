
# ═════════════════════════════════════════════════════════════════════════════
# MODULE: SI_Calibration_v4.yaml
# SISTEMA: EPISTEMIC_SYSTEM_UNIFIED v3.0_OMEGA_SUPERNOVA
# SCOPO: Calibrazione Suppression Index — distinzione veri/falsi positivi
# ═════════════════════════════════════════════════════════════════════════════
# GOVERNANCE LOCKS: GC_141-145
# ENGINE: si_calibration_v4 (Engine #19)
# ═════════════════════════════════════════════════════════════════════════════

module:
  name: "SI_Calibration_v4"
  version: "4.0"
  parent: "agnotology_si_v3 (Engine #4, v2.5_OMEGA_FINAL)"
  parent_system: "EPISTEMIC_SYSTEM_UNIFIED_v3.0_OMEGA_SUPERNOVA"
  status: "ACTIVE"

philosophy: |
  Un SI elevato è il segnale più prezioso del Monolite — se è reale.
  Se è un artefatto, è il più pericoloso. SI_v4 li distingue formalmente.
  Un SI vero positivo dice: "Questa conoscenza è stata attivamente soppressa."
  Un SI falso positivo dice: "Il sistema ha misurato male il rumore."
  Confondere i due causa Consensus Collapse. SI_v4 previene questo.

# ─── FORMULA COMPLETA ─────────────────────────────────────────────────────────
formula:
  base: "SI_base = clamp((IR × FD) / RS, 0.0, 1.0)"
  variables:
    IR:
      name: "Institutional Resistance"
      description: "Livello di opposizione ufficiale, ridicolo mediatico, censura"
      scale: "[0.0 = nessuna resistenza, 1.0 = opposizione totale e coordinata]"
      sources: ["court_records", "press_coverage", "institutional_statements"]
    FD:
      name: "Funding Denial"
      description: "Ritiro o rifiuto sistematico di finanziamenti per ricerca nel dominio"
      scale: "[0.0 = pieno accesso ai fondi, 1.0 = blacklist totale]"
      sources: ["grant_databases", "research_funding_records"]
    RS:
      name: "Replicability Score"
      description: "Facilità di replicazione indipendente del fenomeno"
      scale: "[0.0 = irreplicabile, 1.0 = facilmente replicabile]"
      sources: ["replication_studies", "meta_analyses", "lab_records"]

  micro_clause_adjustment: |
    Se cluster in micro_clause_registry:
      → Applica logica specifica micro-clausola
    Altrimenti:
      → SI_v4 = SI_base (nessuna modifica)

# ─── REGISTRO MICRO-CLAUSOLE ──────────────────────────────────────────────────
micro_clause_registry:

  MC-001:
    id: "MC-001"
    name: "Energia di Frontiera — D6_AETHER"
    domain: "D6_AETHER"
    applies_to_cluster: ["F_S7_meyer_001", "F_S7_reich_001", "F_S7_hutchison_001"]
    council_approved: "2026-05-15"
    guardian_approved_by: "Guardian_1, Guardian_2"
    rationale: |
      Per la ricerca energetica di frontiera, alti valori di IR e FD sono storicamente
      documentati anche per tecnologie successivamente validate. La micro-clausola
      distingue: soppressione reale (IR + FD + RS basso = pattern sistematico) da
      mero scetticismo mediatico (IR alto ma FD basso e RS neutro = rumore).
    logic:
      TRUE_POSITIVE:
        condition: "IR > 0.7 AND FD > 0.5 AND RS < 0.3"
        meaning: "Pattern sistematico di soppressione: resistenza + blocco fondi + non replicabile"
        si_v4: "SI_base (invariato)"
        status: "soppressione_reale"
      MEDIA_BIAS_ONLY:
        condition: "IR > 0.7 AND FD < 0.3 AND RS < 0.3"
        meaning: "Alta resistenza mediatica ma fondi non bloccati — possibile bias, non soppressione"
        si_v4: "SI_base × 0.5"
        status: "artefatto_media_bias"
        action: "REVIEW — Guardian valuta"
      FALSE_POSITIVE:
        condition: "IR > 0.7 AND FD < 0.3 AND RS > 0.5"
        meaning: "Alta resistenza ma fenomeno replicabile — semplicemente controverso, non soppresso"
        si_v4: "SI_base × 0.2"
        status: "artefatto_sistemico"
    application:
      F_S7_meyer_001:
        IR: 0.92  # US court fraud ruling
        FD: 0.88  # research funding terminated
        RS: 0.11  # zero independent replications
        SI_base: 0.90
        micro_clause: "TRUE_POSITIVE"
        SI_v4: 0.90
        verdict: "soppressione_reale"
        note: "Sentenza USA per frode NON equivale a prova scientifica di falsità"
      F_S7_reich_001:
        IR: 0.85  # FDA ban, book burning
        FD: 0.91  # complete research termination
        RS: 0.15  # minimal replication
        SI_base: 0.88
        micro_clause: "TRUE_POSITIVE"
        SI_v4: 0.88
        verdict: "soppressione_reale"
      F_S7_hutchison_001:
        IR: 0.78
        FD: 0.44  # partial funding denial
        RS: 0.22
        SI_base: 0.73
        micro_clause: "MEDIA_BIAS_ONLY"
        SI_v4: 0.37
        verdict: "artefatto_media_bias"
        action: "REVIEW_GUARDIAN"

  MC-002:
    id: "MC-002"
    name: "Preistoria Cognitiva — Σ0-Σ2"
    domain: "D1_PREHISTORY"
    stratum: ["Σ0", "Σ1", "Σ2"]
    council_approved: "2026-05-15"
    rationale: |
      Per i periodi preistorici, l'assenza di fonti non è soppressione — è semplicemente
      l'assenza di scrittura e di digitalizzazione. Un SI elevato per questi periodi
      sarebbe un artefatto metodologico, non un segnale reale.
    logic:
      ALL_CASES:
        condition: "stratum in [Σ0, Σ1, Σ2]"
        si_v4: "min(SI_base, 0.35)"
        meaning: "Assenza di fonti ≠ soppressione in era pre-scrittura"
        status: "lacuna_naturale"
    impact: "SI_global abbassato di ~0.08 con questa micro-clausola"

  MC-003:
    id: "MC-003"
    name: "Conoscenza Indigena — Epistemicidio Coloniale"
    domain: "D_INDIGENOUS"
    frame: "indigenous"
    council_approved: "2026-05-15"
    rationale: |
      La soppressione della conoscenza indigena tramite epistemicidio coloniale
      è storicamente documentata e costituisce vera soppressione. FD non richiede
      "grant denial" ma include "destruction of oral tradition infrastructure" e
      "prohibition of language use".
    logic:
      UNESCO_VALIDATED:
        condition: "fonte UNESCO Intangible Heritage presente E IR > 0.5"
        si_v4: "SI_base (invariato)"
        status: "soppressione_reale_epistemicidio"
        note: "La colonizzazione come IR e FD istituzionale"

# ─── REPORTING SI ─────────────────────────────────────────────────────────────
reporting:
  command: "/si report <domain>"
  output:
    - "Distribuzione SI per dominio (histogram)"
    - "Conteggio TRUE_POSITIVE / FALSE_POSITIVE / REVIEW"
    - "Micro-clausole attive"
    - "Escalazioni Guardian in corso"
    - "Trend SI_global negli ultimi 30 giorni"

