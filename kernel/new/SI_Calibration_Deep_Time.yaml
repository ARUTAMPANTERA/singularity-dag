    UQ_adjusted: 0.61
    verdict: "COGNITIVO_EMERGENTE → STRUTTURATO (borderline)"
    note: "Simmetria biassiale implica concetto mentale di forma target."

  wonderwerk_fire:
    label: "Fuoco controllato, Wonderwerk Cave"
    stratum: "Σ1"
    age: "~1.000.000 a.C."
    species: "Homo erectus avanzato"
    PD: 2
