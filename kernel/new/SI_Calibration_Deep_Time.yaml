    note: "Pattern ripetuti su più pezzi = tradizione simbolica codificata. Soglia Σ2/Σ3."

# ─── COMANDO ─────────────────────────────────────────────────────────────────
command:
  syntax: "/deeptime <factoid_id>"
  output_example: |
    DEEP TIME COGNITIVE ANALYSIS — F_S1_wonderwerk_fire_001
