# ═════════════════════════════════════════════════════════════════════════════
# MODULE: Deep_Time_Cognitive_v1.yaml
# SISTEMA: EPISTEMIC_SYSTEM_UNIFIED v3.0_OMEGA_SUPERNOVA
# SCOPO: Validazione cognitiva profonda per strati Σ0-Σ2
# ═════════════════════════════════════════════════════════════════════════════
# GOVERNANCE LOCKS: GC_146-150
# ENGINE: deep_time_cognitive_v1 (Engine #20)
# ═════════════════════════════════════════════════════════════════════════════

module:
  name: "Deep_Time_Cognitive_v1"
  version: "1.0"
  parent_system: "EPISTEMIC_SYSTEM_UNIFIED_v3.0_OMEGA_SUPERNOVA"
  status: "ACTIVE"

philosophy: |
  La preistoria non è silenzio. È un discorso in una lingua che non abbiamo ancora
  imparato a leggere completamente. Deep_Time_Cognitive non chiede "quanti oggetti"
  ma "quale mente li ha prodotti e con quale grado di intenzionalità".
  Ogni cognition marker è una finestra sul passato cognitivo dell'umanità.

# ─── COGNITIVE MARKERS FRAMEWORK ─────────────────────────────────────────────
cognitive_markers:
  Planning_Depth:
    id: "PD"
    scale: "0-3"
    description: "Profondità di pianificazione implicata dall'artefatto"
    levels:
      0: "Nessuna sequenza pianificata rilevabile"
      1: "Sequenza di 2-3 passi inferibile"
      2: "Sequenza multi-step con selezione materiale documentata"
      3: "Pianificazione multi-sessione, trasporto materie prime a distanza"
    examples:
      0: "Scheggiatura opportunistica"
      1: "Oldowan core preparation"
      2: "Acheuleano biface con riduzione simmetrica"
      3: "Lance di Schöningen — selezione legno + sagomatura aereodinamica + bilanciamento"

  Symbolic_Thought:
    id: "ST"
    scale: "0-3"
    description: "Evidenza di pensiero simbolico o astratto"
    levels:
      0: "Nessun simbolismo identificabile"
      1: "Uso di pigmenti non funzionali"
      2: "Pattern geometrici incisi o ornamenti personali"
      3: "Narrazione visiva complessa (arte rupestre figurativa)"
    examples:
      0: "Tools litici senza marcature"
      1: "Ocra rossa su ossa (funzione ambigua)"
      2: "Incisioni geometriche Blombos — 75.000 a.C."
      3: "Lascaux (Σ3) — narrativa animale complessa"

  Language_Proxy:
    id: "LP"
    scale: "0-2"
    description: "Complessità tecnica necessaria come proxy per capacità linguistica"
    levels:
      0: "Tecnica acquisibile per imitazione senza istruzione verbale"
      1: "Tecnica che suggerisce trasmissione verbale parziale"
      2: "Tecnica che implica istruzione verbale strutturata"
    examples:
      0: "Scheggiatura di percussione diretta"
      1: "Tecnica Levallois (preparazione core complessa)"
      2: "Produzione di lame standardizzate con ritocco sistematico"

  Working_Memory:
    id: "WM"
    scale: "0-2"
    description: "Numero di passi tecnici attestati nell'artefatto"
    levels:
      0: "1-2 passi operativi"
      1: "3-5 passi operativi"
      2: ">5 passi operativi documentati"

# ─── FORMULA CCS ─────────────────────────────────────────────────────────────
formula:
  CCS_raw: "(PD + ST + LP + WM) / 10.0"
  max_raw: "1.0 (PD=3 + ST=3 + LP=2 + WM=2)"
  datation_uncertainty_penalty:
    sigma_0: 0.20
    sigma_1: 0.12
    sigma_2: 0.05
  CCS_final: "clamp(CCS_raw - penalty, 0.0, 1.0)"
  UQ_hard_cap: 0.70  # GC_148 — mai superare 0.70 per Σ0-Σ2
  UQ_formula: "min(UQ_v6_base, 0.70)"

  interpretation:
    "0.00-0.20": "PROTO_COGNITIVO — capacità rudimentali, plasticità limitata"
    "0.21-0.40": "COGNITIVO_EMERGENTE — pianificazione elementare, proto-simbolismo"
    "0.41-0.60": "COGNITIVO_STRUTTURATO — pianificazione multi-step, trasmissione culturale"
    "0.61-0.80": "COGNITIVO_AVANZATO — simbolismo, linguaggio probabile, cultura materiale"
    "0.81-1.00": "COGNITIVO_MODERNO — equivalente Homo sapiens moderno (raro in Σ0-Σ2)"

# ─── CASEBOOK FACTOID Σ0-Σ2 ──────────────────────────────────────────────────
casebook:

  olduvai_chopper:
    label: "Choppers Oldowan, Olduvai Gorge"
    stratum: "Σ0"
    age: "~1.800.000 a.C."
    species: "Homo habilis"
    PD: 1
    ST: 0
    LP: 0
    WM: 0
    CCS_raw: 0.10
    penalty: 0.20
    CCS: 0.00
    UQ_adjusted: 0.42
