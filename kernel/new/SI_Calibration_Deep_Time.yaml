    note: |
      CCS più alto del periodo Σ1-Σ2. Selezione legno di abete per proprietà
      elastiche specifiche + bilanciamento punto di gravità a 1/3 = fisica applicata.
      Implica trasmissione culturale strutturata (LP=2).

  blombos_ochre:
    label: "Incisioni geometriche su ocra, Blombos Cave"
    stratum: "Σ2"
    age: "~75.000 a.C."
