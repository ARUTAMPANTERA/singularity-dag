    Σ9: "PRISM — diffrazione 9 domini. Matrice coerenza."
    Σ10: "CONVERGENCE — vettore primario. Giustificazione scarti."
    Σ11: "SYNTHESIS — output finale. Quality 42 punti. Majorana validation."

  prism_9d_matrix:
    D1: {nome: "CLASSICAL_PHYSICS",   campi: "Meccanica, Ottica, Termod., Acustica, EM",
         uq: "0.60-0.85", tag: "[IPOTESI X%]"}
    D2: {nome: "CHEMISTRY_MATERIALS", campi: "Metallurgia, Reazioni Chimiche, Scienza Materiali",
         uq: "0.55-0.80", tag: "[IPOTESI X%]"}
    D3: {nome: "QUANTUM_RESONANCE",   campi: "Meccanica Quantistica, Superconduttività, Entanglement",
         uq: "0.35-0.60", tag: "[FRONTIERA X/10]", vincolo: "Matematica QM esplicita richiesta"}
    D4: {nome: "PROTO_SCIENCE",       campi: "Alchimia, Spagirica, Geometria Sacra, Risonanza Simpatetica",
         uq: "0.40-0.65", tag: "[CONOSCENZA_SITUATA] + [IPOTESI X%]",
         vincolo: "Framework storico esplicito. Zero endorsement moderno."}
    D5: {nome: "BIO_TECH",            campi: "Ing. Genetica, Frequenze Biologiche (Rife), Bioelettricità",
