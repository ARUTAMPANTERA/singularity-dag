# ═══════════════════════════════════════════════════════════════════════════
# PATTERN + CLUSTER + SIGNIFICANCE + RETE ETER + TEMPORAL
# ═══════════════════════════════════════════════════════════════════════════
pattern_intelligence:

  # ─── ANTI-BIAS ENGINE v3 ──────────────────────────────────────────────
  anti_bias_v3:
    regole:
      - "Alta frequenza → basso valore. Pattern ovunque = non significativo."
      - "Somiglianza fonetica isolata → scartare."
      - "Serve MINIMO 2 su 3: coerenza_semantica + coerenza_storica + ripetizione."
      - "Connessioni fuori timeline → bloccare."
    penalty:
      high_bias_patterns: -0.40
      somiglianza_fonetica_isolata: -0.60
      pattern_senza_base_storica: -0.80

  # ─── SIGNIFICANCE ENGINE ─────────────────────────────────────────────
  significance_engine:
    formula: "score = (rarity × coherence × repetition) - bias_penalty"
    variabili:
      rarity:       "rarità pattern nel corpus (0-1)"
      coherence:    "coerenza semantica + storica + fonetica (0-1)"
      repetition:   "ricorrenze in fonti indipendenti (0-1)"
      bias_penalty: "valore da anti_bias (0-0.80)"
    classificazione:
      forte:  "> 0.80 — pattern reale"
      medio:  "0.50-0.80 — plausibile, richiede conferme"
      debole: "< 0.50 — insufficiente, NON citare come evidenza"

  # ─── PATTERN MINER — 7 TIPI ──────────────────────────────────────────
  pattern_miner:
    tipi:
      frequency_anomaly: "ricorrenza statisticamente anomala"
      sequence:          "ordine narrativo ricorrente tra testi"
      symmetry:          "strutture speculari interne"
      inversion:         "rovesciamento struttura narrativa"
      co_occurrence:     "elementi sempre insieme"
      structural_break:  "punto cambio registro o stile"
      narrative_cycles:  "discesa/ritorno, caos/ordine, morte/rinascita"
    trigger: "ricorrenza non-casuale (≥2 fonti indipendenti)"
    auto_scan: "corpus ≥2 testi"
    output_per_pattern: ["tipo", "score significance", "fonti", "compatibilità temporale", "tag"]

  # ─── CLUSTER ENGINE ──────────────────────────────────────────────────
  cluster_engine:
    obiettivo: "Raggruppare testi per struttura narrativa — non per nome o tradizione."
    auto_trigger: "n_testi ≥3"
    metodo: ["estrai pattern", "normalizza", "calcola similarità strutturale", "cluster soglia ≥0.50"]
    tipi_relazione:
      identico:    ">0.90 — stessa fonte o copia diretta"
      derivato:    ">0.70 — dipendenza consapevole"
      trasformato: "0.50-0.70 — struttura comune, contenuto adattato"
      indipendente: "0.50-0.65 — convergenza senza contatto"

  # ─── RETE ETER — DATABASE 1856-2026 ──────────────────────────────────
  rete_eter:
    periodo: "1856-2026 (170 anni)"
    descrizione: "Ricercatori con connessioni trasversali in energia/fisica/cosmologia non-mainstream"

    ricercatori_principali:
      tesla_nikola:     {periodo: "1856-1943", campo: "elettromagnetismo, energia wireless, risonanza"}
      marconi_guglielmo:{periodo: "1874-1937", campo: "radio, onde lunghe"}
      ighina_pier_luigi:{periodo: "1908-2004", campo: "monopolo magnetico, controllo atmosferico"}
      majorana_ettore:  {periodo: "1906-1938", campo: "neutrini, simmetria particella-antiparticella"}
      schauberger_viktor:{periodo: "1885-1958", campo: "implosione, vortici, energia idrica"}
      reich_wilhelm:    {periodo: "1897-1957", campo: "orgone, energia vitale, meteorologia"}
      moray_thomas:     {periodo: "1892-1974", campo: "energia radiante, semiconduttore freddo"}
      puthoff_harold:   {periodo: "1936-oggi", campo: "ZPE, fisica del vuoto"}
      haisch_bernard:   {periodo: "1949-oggi", campo: "inerzia da ZPF, cosmologia"}
      bohm_david:       {periodo: "1917-1992", campo: "ordine implicato, fisica quantistica"}
      sheldrake_rupert: {periodo: "1942-oggi", campo: "campi morfogenetici, risonanza morfica"}

    ciclo_17:
      1: "OSSERVAZIONE fenomeno fisico reale"
