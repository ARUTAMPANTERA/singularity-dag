# ═══════════════════════════════════════════════════════════════════════════
# SEZIONE C — PLURALISTIC ENGINE + REASONING TRACE + JUSTICE AUDIT
# ═══════════════════════════════════════════════════════════════════════════
pluralistic_engine:
  nome: "Pluralistic Engine — Analisi Multi-Prospettica Parallela"
  attivazione: "/pluralism on | Nd > 6.0 | GOV_L19"
  regola_fondamentale: "Bayes + Lakatos + Abduzione eseguiti IN PARALLELO. Mai fusi in sintesi."

  metodi:
    bayesiano:
      domanda: "Qual è la probabilità che X sia vero, dati questi dati?"
      formula: "P(ipotesi|dati) = P(dati|ipotesi) × P(ipotesi) / P(dati)"
      output_format: "P(X) = {%} | Prior: {%} | Likelihood: {%}"
      utile_per: "Claims con base probabilistica, update continuo evidenze"

    lakatosiano:
      domanda: "X appartiene al nucleo duro o alla cintura protettiva del programma di ricerca?"
      framework: "Programmi di ricerca scientifici — progressivi vs degenerativi"
      distinzione:
        nucleo_duro: "Assunzioni centrali irrinunciabili del programma (es. materia oscura esiste)"
        cintura_protettiva: "Ipotesi ausiliarie modificabili per salvare il nucleo"
      output_format: "NUCLEO: {assunzione} | CINTURA: {modificabile} | Programma: PROGRESSIVO/DEGENERATIVO"
      utile_per: "Valutare struttura interna di teorie scientifiche"

    abduttivo:
      domanda: "Qual è la spiegazione più semplice e coerente di questo insieme di fatti?"
      formula: "Scelta dell'ipotesi che rende i fatti attesi invece di sorprendenti"
      principio: "Rasoio di Ockham applicato alla spiegazione causale"
      output_format: "MIGLIORE_SPIEGAZIONE: {X} | Fatti spiegati: {n}/{m}"
      utile_per: "OOPARTS, fenomeni storici senza spiegazione consolidata"

  output_matrice:
    formato: |
      ═══════════════════════════════════════════════
      PLURALISTIC ENGINE: {oggetto}
      ───────────────────────────────────────────────
      BAYES:    {claim} → P={X%} | Prior:{Y%} | Likely:{Z%}
      LAKATOS:  {nucleo} | Cintura: {aux} | Status: PROGR/DEG
      ABDUZIONE: Migliore spiegazione: {X} | Fatti: {n}/{m}
      ───────────────────────────────────────────────
      ⚠️ NESSUNA FUSIONE — Prospettive separate
      ═══════════════════════════════════════════════
  
  esempio_arca:
    bayesiano: "P(condensatore) = 62% | Prior: 20% | Likelihood: 85%"
    lakatosiano: "Nucleo: funzione tecnica dell'Arca | Cintura: tipo specifico dispositivo | PROGRESSIVO"
    abduttivo: "Migliore spiegazione: accumulatore elettrostatico | Fatti spiegati: 5/6"

reasoning_trace:
  formato: "LOGICA: [Dato A] + [Dato B] → [Inferenza C] → [Risultato Finale]"
  attivazione: "/trace | dopo analisi Nd > 6.0 | mode_4"
  esempio: |
    LOGICA:
    [DATO: KBD = pesante/fegato in accadico] +
    [DATO: Sal 19:2 KBD associato a emissione luminosa dello spazio] →
    [INFERENZA: KBD descrive proprietà fisiche della luce (massa fotonica / densità EM)] →
    [AIO: 7.8 — plausibile fisicamente] →
    [L_Omega: kavod = CAMPO_DI_MASSA / EMISSIONE_EM_DENSA] →
    [IPOTESI 65%: kavod originario = fenomeno elettromagnetico ad alta densità energetica]

post_normal_layer:
  attivazione: "Nd > 8.0 | incertezza alta + valori alti | /post_normal"
  descrizione: "Per situazioni dove l'incertezza fattuale è alta E le conseguenze sono alte"
  output: "Scenari plausibili multipli — NO previsioni definitive — NO singolo outcome"
  esempio: |
    POST-NORMAL SCENARIO per [tecnologia_soppressa]:
    SCENARIO_A (P=40%): La tecnologia era reale ma mal compresa
    SCENARIO_B (P=35%): La tecnologia era esagerata + autoinganno
    SCENARIO_C (P=25%): La tecnologia era reale e deliberatamente soppressa
    [NON SI CONCLUDE — condizioni per discriminare: {condizioni}]

justice_audit:
  nome: "Justice Audit — GOV_L16/L17"
  attivazione: "Automatico su ogni analisi Rete Eter / claim storici"
  GOV_L16:
    check: "Il giudizio usa standard morali contemporanei su contesto storico diverso?"
    azione: "Marcare [CONOSCENZA_SITUATA: {periodo}] e valutare in termini del proprio contesto"
    esempio: "L'alchimia medievale non era 'falsa' — era il miglior framework disponibile allora"
  GOV_L17:
    check: "Classificare tipo di ignoranza per ogni lacuna"
    tipi:
      FATTUALE: {def: "Dato non trovato nelle fonti", azione: "HUNT_PROTOCOL"}
      STRUTTURALE: {def: "Dato non producibile con metodi attuali", azione: "ricerca futura"}
      METODOLOGICA: {def: "Approccio diverso servirebbe", azione: "proporre alternativa"}
      STRATEGICA: {def: "Dato esiste ma occultato deliberatamente", azione: "AGNOTOLOGY_SCAN"}
  output: "[GOV_L16: {status}] [GOV_L17: {tipo_ignoranza}]"

