  # ─── PROTO-SINAITICO — GLIFI CON FUNZIONE SEMANTICA ────────────────
  proto_sinaitico_glifi:
    descrizione: |
      Mappatura glifi proto-sinaitici (1900-1500 a.C.) → significato originale.
      Il proto-sinaitico è il proto-alfabeto di tutti gli alfabeti moderni.
      Ogni glifo conserva il nome dell'oggetto come suono (acrofonia).
    
    tabella:
      aleph: {glifo: "𓃾", simbolo: "ʔ", oggetto: "testa_bue", funzione: "vettore-potenza"}
      bet:   {glifo: "𓉐", simbolo: "b",  oggetto: "casa/tenda",  funzione: "modulo-abitativo"}
      gimel: {glifo: "𓌙", simbolo: "g",  oggetto: "bastone_lancio", funzione: "traiettoria-curva"}
      dalet: {glifo: "𓇯", simbolo: "d",  oggetto: "porta/pesce", funzione: "vettore-uscita"}
      he:    {glifo: "𓀠", simbolo: "h",  oggetto: "uomo_braccia_alzate", funzione: "emissione-segnale"}
      vav:   {glifo: "𓏲", simbolo: "w",  oggetto: "gancio/chiodo", funzione: "connessione-fissa"}
      zayin: {glifo: "𓌀", simbolo: "z",  oggetto: "arma/catena", funzione: "proiettile-lineale"}
      het:   {glifo: "𓉗", simbolo: "ḥ",  oggetto: "cortile/recinto", funzione: "campo-confinato"}
      tet:   {glifo: "𓇱", simbolo: "ṭ",  oggetto: "ruota/bobina", funzione: "rotazione-accumulo"}
      yod:   {glifo: "𓂝", simbolo: "y",  oggetto: "braccio_mano", funzione: "operatore-diretto"}
      kaf:   {glifo: "𓂧", simbolo: "k",  oggetto: "palmo_mano", funzione: "ricevitore-superficie"}
      lamed: {glifo: "𓌀", simbolo: "l",  oggetto: "bastone_pastore", funzione: "guida-direzionale"}
      mem:   {glifo: "𓈖", simbolo: "m",  oggetto: "acqua/onda", funzione: "flusso-oscillante"}
      nun:   {glifo: "𓆓", simbolo: "n",  oggetto: "serpente/pesce", funzione: "propagazione-sinuosa"}
      samek: {glifo: "𓊤", simbolo: "s",  oggetto: "supporto/colonna", funzione: "struttura-portante"}
      ayin:  {glifo: "𓁹", simbolo: "ʿ",  oggetto: "occhio", funzione: "rilevatore-campo"}
      pe:    {glifo: "𓂋", simbolo: "p",  oggetto: "bocca", funzione: "emettitore-focale"}
      tsade: {glifo: "𓇌", simbolo: "ṣ",  oggetto: "pianta/cacciatore", funzione: "estrazione-radice"}
      qof:   {glifo: "𓃒", simbolo: "q",  oggetto: "scimmia/capocchia", funzione: "retroazione-circolare"}
      resh:  {glifo: "𓁶", simbolo: "r",  oggetto: "testa_umana", funzione: "apice-direzionale"}
      shin:  {glifo: "𓌀", simbolo: "š",  oggetto: "dente/arco", funzione: "taglio-pressione"}
      tav:   {glifo: "𓇓", simbolo: "t",  oggetto: "croce/segno", funzione: "marcatore-riferimento"}
    
    implicazione_L_omega: |
      Ogni radice bilittera contiene la fusione di 2 funzioni proto-sinaitiche.
      KBD = K(ricevitore-superficie) + B(modulo-abitativo) + D(vettore-uscita)
           = superficie che raccoglie + contiene + dirige verso uscita
           = ACCUMULATORE CON USCITA DIREZIONALE

