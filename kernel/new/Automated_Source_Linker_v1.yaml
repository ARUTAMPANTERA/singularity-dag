
# ═════════════════════════════════════════════════════════════════════════════
# MODULE: Automated_Source_Linker_v1.yaml
# SISTEMA: EPISTEMIC_SYSTEM_UNIFIED v3.0_OMEGA_SUPERNOVA
# SCOPO: Chiusura automatica delle lacune [LACUNA_DATI] via IPFS/Filecoin
# ═════════════════════════════════════════════════════════════════════════════
# GOVERNANCE LOCKS: GC_121-130
# ENGINE: automated_source_linker_v1 (Engine #17)
# ═════════════════════════════════════════════════════════════════════════════

module:
  name: "Automated_Source_Linker_v1"
  version: "1.0"
  parent_system: "EPISTEMIC_SYSTEM_UNIFIED_v3.0_OMEGA_SUPERNOVA"
  status: "ACTIVE"
  dag_artifact: "DAG:SOURCE_LINKER_v1_001"

# ─── OBIETTIVO ───────────────────────────────────────────────────────────────
objective:
  primary: "Ridurre il tasso di lacune [LACUNA_DATI] da 70% a <50% nei legacy nodes (1-274)"
  secondary: "Garantire che ogni nuovo factoid nasca con CID verificabile (campo 56)"
  philosophy: "Il vuoto non si accetta passivamente. Si cerca attivamente senza mai inventare."

# ─── ARCHITETTURA ─────────────────────────────────────────────────────────────
architecture:
  components:
    query_builder:
      description: "Costruisce query per ricerca IPFS a partire da label + domain + time_span"
      input: "factoid fields: label, description, domain, time_span, entities"
      output: "query_string ottimizzata per DHT IPFS"
      strategy: |
        1. Estrai entità chiave (persone, luoghi, oggetti) da label e description
        2. Aggiungi dominio e periodo come filtri
        3. Priorità a: "primary_source", "digitized_manuscript", "archival_record"
        4. Formato: "{entity} {period} primary_source {domain_keyword}"
      examples:
        - factoid: "Torricelli - Esperimento barometrico (1643)"
          query: "Torricelli barometer 1643 primary_source physics manuscript"
        - factoid: "Tavoletta cuneiforme Ur III (2100 a.C.)"
          query: "Ur III cuneiform tablet 2100 BCE primary_source Mesopotamia digitized"

    ipfs_resolver:
      description: "Risolve query su rete IPFS con fallback multipli"
      gateways:
        primary: "https://ipfs.io/api/v0/cat"
        fallback_1: "https://cloudflare-ipfs.com/ipfs/"
        fallback_2: "https://gateway.pinata.cloud/ipfs/"
        fallback_3: "https://dweb.link/ipfs/"
      timeout_seconds: 10
      max_retries: 3
      retry_strategy: "exponential_backoff: 1s, 3s, 9s"
      on_failure: "[LACUNA_DATI_PERSISTENTE:{log_id}:{timestamp}]"

    filecoin_verifier:
      description: "Verifica che il CID abbia un deal attivo su Filecoin"
      api: "https://api.filecoin.io/rpc/v1"
      check: "filecoin_dealstatus(CID) → active | expired | not_found"
      on_expired: "Cerca replica su Internet Archive IPFS Mirror"
      on_not_found: "Accetta comunque se gateway IPFS risponde 200 (pin locale)"

    content_validator:
      description: "Verifica pertinenza del contenuto trovato vs factoid"
      method: |
        1. Estrai testo dal documento CID (primi 2000 token)
        2. Calcola UQ_delta = similarità_semantica(testo_CID, factoid_description)
        3. Se UQ_delta > 0.15: CID accettato
        4. Se UQ_delta ≤ 0.15: CID rifiutato (documento non pertinente)
      semantic_threshold: 0.15

    cid_writer:
      description: "Aggiorna il factoid con CID verificato"
      fields_updated:
        - "field_56 (ipfs_cid): 'ipfs://{CID}'"
        - "sources: aggiunto CID come fonte primaria"
        - "verification_status: 'verified_via_ipfs'"
        - "verification_timestamp: ISO8601"
        - "updated_by: 'automated_source_linker_v1'"
      atomic: true
      rollback_on_failure: true

# ─── PIPELINE ESECUZIONE ──────────────────────────────────────────────────────
execution_pipeline:
  trigger_conditions:
    - "Campo sources = [LACUNA_DATI]"
    - "Comando /link <factoid_id>"
    - "Comando /link batch <stratum>"
    - "Nuovo factoid creato con /dag_create senza sources"

  steps:
    - step: 1
      name: "Selezione Factoid"
      action: "Preleva factoid con [LACUNA_DATI] dalla priority queue"
      priority_order:
        - "Legacy nodes 1-274 (ordine per importanza storica)"
        - "Nuovi factoid senza CID"
        - "Factoid con [LACUNA_DATI_PERSISTENTE] da retry"

    - step: 2
      name: "Query Building"
      action: "Costruisci query IPFS da metadati factoid"
      output: "query_string, fallback_queries[]"

    - step: 3
      name: "IPFS Resolution"
      action: "Risolvi query su rete IPFS con max 3 tentativi"
      output: "CID[] candidati | null"

    - step: 4
      name: "Filecoin Verification"
      action: "Verifica deal attivo per ogni CID candidato"
      output: "CID_verified[] | null"

    - step: 5
      name: "Content Validation"
      action: "Valida pertinenza contenuto CID vs factoid"
      output: "CID_valid con UQ_delta | null"

    - step: 6
      name: "CID Write"
      action: "Aggiorna factoid con CID verificato"
      condition: "CID_valid trovato"
      output: "factoid aggiornato | [LACUNA_DATI_PERSISTENTE:{log_id}]"

    - step: 7
      name: "DAG Log"
      action: "Registra operazione nel DAG (successo o fallimento)"
      always: true
      fields: ["factoid_id", "timestamp", "result", "CID_or_log_id", "UQ_delta"]

# ─── INTEGRATIONS PRIORITARIE ────────────────────────────────────────────────
priority_integrations:
  tier_1_primary:
    - name: "Internet Archive IPFS Mirror"
      url: "https://archive.org/services/docs/api/"
      domains: ["storico", "scientifica", "manoscritti"]
      coverage: "30M+ documenti digitalizzati"

    - name: "Europeana LOD"
      url: "https://data.europeana.eu/"
      domains: ["arte", "storia_europea", "fotografia_storica"]
      coverage: "50M+ oggetti culturali europei"

  tier_2_secondary:
    - name: "British Museum Digital Collections"
      url: "https://www.britishmuseum.org/collection/search"
      domains: ["mesopotamia", "egitto_antico", "grecia_classica"]

    - name: "Oriental Institute Chicago"
      url: "https://oi.uchicago.edu/research/publications/oip"
      domains: ["mesopotamia", "egitto_antico", "medio_oriente_antico"]

    - name: "Gallica BnF"
      url: "https://gallica.bnf.fr/"
      domains: ["storia_francese", "manoscritti_medievali", "scienza_moderna_precoce"]

    - name: "HathiTrust Digital Library"
      url: "https://www.hathitrust.org/"
      domains: ["scientifico", "storico", "letterario"]

  tier_3_supplementary:
    - name: "OpenAlex"
      url: "https://api.openalex.org/"
      domains: ["scientifico_moderno", "peer_reviewed"]

    - name: "Semantic Scholar"
      url: "https://api.semanticscholar.org/"
      domains: ["scientifico", "tecnico"]

# ─── REPORTING ────────────────────────────────────────────────────────────────
reporting:
  frequency: "ogni_24h"
  metrics:
    - "total_lacune_at_start"
    - "lacune_resolved_today"
    - "lacune_resolved_total"
    - "lacune_persistent_total"
    - "avg_UQ_delta_resolved"
    - "top_10_persistent_factoids"
    - "gateway_success_rates"
  command: "/lacune report"
  output_format: "YAML + human-readable summary"

# ─── ESEMPIO OPERATIVO ────────────────────────────────────────────────────────
example_run:
  factoid_before:
    factoid_id: "F_S10_torricelli_barometer_001"
    label: "Esperienza del Torricelli (1643)"
    domain: "D3_SCIENCE"
    sources: "[LACUNA_DATI]"
    field_56_ipfs_cid: null
    verification_status: "pending"

  linker_process:
    query: "Torricelli barometer experiment 1643 manuscript primary_source"
    ipfs_attempt_1: "Timeout"
    ipfs_attempt_2: "CID: QmTorr1643ExperimentOriginalManuscriptFaenza"
    filecoin_status: "active_deal"
    content_check: "UQ_delta = 0.81 (alta pertinenza)"
    result: "CID_VALID"

  factoid_after:
    sources: "ipfs://QmTorr1643ExperimentOriginalManuscriptFaenza"
    field_56_ipfs_cid: "ipfs://QmTorr1643ExperimentOriginalManuscriptFaenza"
    verification_status: "verified_via_ipfs"
    verification_timestamp: "2026-05-15T10:23:41Z"
    updated_by: "automated_source_linker_v1"
