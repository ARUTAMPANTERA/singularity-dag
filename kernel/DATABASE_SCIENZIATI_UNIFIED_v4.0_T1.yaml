    stato_generazione: "COMPLETATA"

  - id: T1-091
    nome: "Karl Pribram"
    tipo_nodo: "RICERCATORE"
    periodo: "1919-2015"
    nazione: "AT/US"
    field: "Neuroscienze, cervello olografico"
    status: "CONTROVERSO"
