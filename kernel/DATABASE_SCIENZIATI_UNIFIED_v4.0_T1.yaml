    it_score: 0.75
    note_speciali: "[PRECURSORE_RETE_ETER] — Cervello olografico + connessione con Bohm"
    connessioni:
      - {id: "T1-042", nome: "Bohm", tipo: "collaborazione_teorica", forza: 0.85}
    note: |
      Teoria olografica del cervello: la memoria è distribuita come pattern di frequenza
      in tutto il cervello (non localizzata).
      Con Bohm: l'universo è un ologramma in cui ogni parte contiene il tutto.
    impatto_storico: "Modello olografico del cervello; collaborazione Bohm-Pribram"
    l_plus_1_heirs: ["Penrose (coscienza quantistica)"]
    stato_generazione: "COMPLETATA"

  - id: T1-092
    nome: "Roger Penrose"
    tipo_nodo: "RICERCATORE"
    periodo: "1931-oggi"
    nazione: "GB"
    field: "Matematica, cosmologia, coscienza quantistica"
    status: "CONTROVERSO"
    certezza: "alta"
    it_score: 0.82
    note: |
      Nobel 2020 per buchi neri. Teoremi di singolarità.
      Penrose-Hameroff: coscienza come processo quantistico nei microtubuli.
      Controverso ma preso sul serio.
    impatto_storico: "Buchi neri (Nobel); teoria della coscienza quantistica (controversa)"
    stato_generazione: "COMPLETATA"

