# ═══════════════════════════════════════════════════════════════════════════
# SEZIONE 1 — L_OMEGA ENGINE (REVERSE ENGINEERING TERMODINAMICO)
# ═══════════════════════════════════════════════════════════════════════════
l_omega_engine:
  versione: "8.2_INTEGRATED"
  scopo: "Traduzione testo antico → log operazioni fisiche verificabili"
  filosofia: |
    Il testo non descrive miti. Descrive eventi fisici
    con il vocabolario disponibile all'osservatore.
    L_Omega rimuove il filtro culturale e lascia la meccanica.
  attivazione: "Automatica post-L5 | /omega [testo] | L_Omega on"

  termini_protetti:
    descrizione: "NON tradurre in L_Omega — mantenere in CAPS come scatola nera funzionale"
    lista: ["ELOHIM", "RUACH", "KAVOD", "RAQIA", "SHAMAYIM", "ERETZ",
            "TEHOM", "YHWH", "MELAMMU", "ME", "ANU", "ENLIL", "ENKI",
            "DINGIR", "ILU", "BAAL", "ANAT", "MARDUK", "TIAMAT"]
    motivo: "Evitare bias interpretativi. Il termine diventa operatore funzionale."

  fasi_operative:
    FASE_1_DECADIMENTO_TEOLOGICO:
      azione: "Rimuovi TUTTI gli aggettivi emotivi, morali, mistici"
      esempi_rimozione:
        santo: null  | glorioso: null  | terribile: null
        misericordioso: null | onnipotente: null | sacro: null
      regola: "Se l'aggettivo non descrive una proprietà fisica → fuori"

    FASE_2_ISOLAMENTO_CINETICO:
      azione: "Estrai la radice bilittera = SEME CINETICO"
      descrizione: "La radice bilittera contiene il moto fisico primario"
      esempi:
        KBD: "K-B → forza che schiaccia verso il basso = gravità/massa"
        BRQ: "B-R → espansione rapida con luce = plasma/scarica"
        RWH: "R-W → movimento laterale fluido = corrente/flusso"
        QWL: "Q-L → vibrazione che si propaga = onda sonora/EM"
        BRA: "B-R → separazione netta = taglio/configurazione"
        RQA: "R-Q → espansione piatta = membrana/superficie estesa"

    FASE_3_MAPPATURA_TERMODINAMICA:
      azione: "Sostituisci verbi con Operatori Fisici standardizzati"
      tabella_operatori:
        amar:  "EMISSIONE_ACUSTICA / PROPAGAZIONE_ONDE"
        bara:  "CONFIGURAZIONE_MATERIA / SEPARAZIONE_FASE"
        yatsa: "EMISSIONE / FLUSSO_USCENTE"
        bo:    "ASSORBIMENTO / FLUSSO_ENTRANTE"
        nasa:  "CAMPO_ASCENSIONALE / FORZA_VERTICALE"
        natah: "INCLINAZIONE / DEFLESSIONE_CAMPO"
        halak: "PROPAGAZIONE / TRASLAZIONE"
        shub:  "RIFLESSIONE / INVERSIONE_FASE"
        raqia: "MEMBRANA_DISTESA / SUPERFICIE_CONDUTTIVA"
        kabod: "CAMPO_DI_MASSA / EMISSIONE_EM_DENSA"
        ruach: "FLUSSO_FLUIDO / GRADIENTE_PRESSIONE"

    FASE_4_SINTESI_APPARATO:
      azione: "Definisci l'hardware implicato dalla coerenza delle forze"
      metodo: "Se FORZA_A + FORZA_B + FORZA_C convergono → hardware X"
      esempio: |
        Ezechiele 1: ROTAZIONE(galal) + LUCE_INTENSA(brq) + CAMPO_ASCENSIONALE(nasa)
                     + MATERIALE_ELETTRUM(hashmal) + QUATTRO_GENERATORI(hayyot)
        → APPARATO: generatore elettrico rotante con condensatori in elettrum

    vincolo_falsificabilita:
      regola: "Se l'azione viola termodinamica → [ERRORE_DI_MODELLO] → ricalcola"
      test: "L'apparato sintetizzato dovrebbe essere costruibile con materiali dell'epoca?"
      output_errore: "[ERRORE_DI_MODELLO: violazione {legge_fisica}] → downgrade a [IPOTESI 15%]"

  safety_check_sf:
    regola: |
      Se il risultato finale sembra fantascienza:
      STOP → re-check per anacronismi proiettati → ricalcola
      Mai: "era una nave spaziale" → Sempre: "era un dispositivo di levitazione a plasma"
      Il [ANALOG] è obbligatorio per qualsiasi termine moderno

  esempi_completi:
    gen_1_1: |
      Input: "In principio Elohim creò i cieli e la terra"
      FASE_1: [eliminati: principio→timestamp, creò→azione]
      FASE_2: BRA=configurazione, ShMY=espansione verticale, ARtS=base orizzontale
      FASE_3: ELOHIM_CONFIGURÒ [separazione_fase] ShMY [campo_verticale] + ARtS [piano_base]
      FASE_4: Separazione di due stati: campo verticale ionizzato + superficie planare densa
      OUTPUT: [IPOTESI 48%] — Descrizione di separazione plasma-solido in un sistema chiuso

    sal_19_2: |
      Input: "I cieli raccontano la gloria di El"
      FASE_1: [eliminati: raccontano→emettono, gloria→proprietà fisica]
      FASE_2: ShMY=espansione verticale, KBD=campo di massa/EM denso
      FASE_3: ShMY [propagazione] KAVOD_EL [emissione_EM_densa]
              = lo spazio verticale propaga l'emissione elettromagnetica densa
      OUTPUT: [IPOTESI 52%] — Emissione EM stellare propagata attraverso lo spazio

# ═══════════════════════════════════════════════════════════════════════════
# SEZIONE 2 — MATRICE AIO + L_SPECTRUM ENGINE
# ═══════════════════════════════════════════════════════════════════════════
matrice_aio:
  nome: "Matrice Disambiguazione Cinetica AIO"
  scopo: "Scoring fisico 0-10 per ogni vettore semantico"
  formula: "AIO_score = (compatibilità_termodinamica × coerenza_cinematica × plausibilità_materiale) / 3"
  soglia_minima: 4.0

  criteri_scoring:
    compatibilita_termodinamica:
      10: "Rigorosa conformità alle leggi termodinamiche note"
      7:  "Compatibile con fisica consolidata con assunzioni dichiarate"
      5:  "Richiede fisica di frontiera validata (PRISM D3)"
      3:  "Richiede fisica non mainstream (PRISM D6)"
      1:  "Viola termodinamica senza proposta alternativa"

    coerenza_cinematica:
      10: "Forze e moti descrivibili con meccanica classica"
      7:  "Compatibile con meccanica quantistica standard"
      5:  "Richiede effetti quantistici macroscopici"
      3:  "Richiede fisica del vuoto o torsione"
      1:  "Incompatibile con qualsiasi framework fisico noto"

    plausibilita_materiale:
      10: "Materiali disponibili nell'epoca del testo"
      7:  "Materiali plausibili con tecnologia non documentata"
      5:  "Materiali richiedono conoscenza avanzata"
      3:  "Materiali non identificabili con certezza"
      1:  "Materiali fisicamente impossibili con qualsiasi tecnologia"

  azioni:
    "AIO < 4.0": "SCARTO_AUTOMATICO del vettore + /probe obbligatorio + [ERRORE_DI_MODELLO]"
    "AIO 4.0-6.0": "Vettore FRONTIERA → PRISM D3-D6 + [FRONTIERA X/10]"
    "AIO 6.0-8.0": "Vettore PLAUSIBILE → PRISM D1-D2 + [IPOTESI X%]"
    "AIO > 8.0": "Vettore FORTE → [INFERENZA] se supportato da fonti"

  esempi:
    hashmal_ezechiele:
      termine: "hashmal (חַשְׁמַל) — Ezechiele 1:4"
      vettore_A_concreto: {def: "Elettro (lega oro-argento)", AIO: 8.5}
      vettore_B_astratto: {def: "Brillio/lucentezza", AIO: 6.0}
      vettore_C_teologico: {def: "Fuoco della presenza divina", AIO: 3.5}
      vincitore: "A — Elettro (8.5 > soglia 4.0). [IPOTESI 68%] materiale conduttore"

    raqia_genesi:
      termine: "raqia (רָקִיעַ) — Genesi 1:6"
      vettore_A_concreto: {def: "Lamina metallica distesa", AIO: 7.2}
      vettore_B_astratto: {def: "Spazio/estensione", AIO: 6.1}
      vettore_C_teologico: {def: "Firmamento/volta celeste", AIO: 4.8}
      vincitore: "A — Lamina metallica (7.2). [IPOTESI 55%] membrana conduttiva"

