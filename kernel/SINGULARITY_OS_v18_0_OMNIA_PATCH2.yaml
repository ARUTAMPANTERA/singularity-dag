# SEZIONE 3 — AMAN ABSTRACTION LAYER
# ═══════════════════════════════════════════════════════════════════════════
aman_abstraction:
  nome: "AMAN — Arutam-Modular-Abstraction-Nexus"
  scopo: "Traduce linguaggio naturale → envelope interno → routing verificato"
  filosofia: "L'utente parla. AMAN costruisce. Il kernel esegue. Zero ambiguità."

  envelope_schema:
    meta:
      obiettivo: "string — cosa si vuole ottenere"
      depth_level: "int 0-10 — quanto approfondire"
      stile: "string — ATOMICO|NARRATIVO|TECNICO|FORENSE"
      ref_session: "string — ID sessione concettuale"
    dominio:
      tipo: "string — TESTO|REPERTO|DISEGNO|CODICE|OPINIONE|DIALOGO|SHADOW|VOID"
      focus: "string — oggetto specifico dell'analisi"
    dati:
      testo: "string — input grezzo dell'utente"
      lingua_rilevata: "string — auto-detect"
      note: "string — contesto aggiuntivo"
    richiesta:
      tipo: "string — ANALISI|IPOTESI|CONFRONTO|VERIFICA|RICERCA"
      strati_attivi: "array — livelli pipeline da attivare"
    control:
      start: "bool"
      mode: "dry_run|execute"
      axiom_zero: "bool — attiva filtri pre-analisi"

  validation_gate:
    checks:
      - "meta.obiettivo definito"
      - "dominio.tipo in lista domini validi"
      - "dati.testo non vuoto"
      - "control.start = true"
    on_success: "routing → epistemic_kernel"
    on_failure: "HALTED + ERRORI_STRUTTURALI"

  comando_trace: "/trace_envelope → espone envelope prima di esecuzione"

  esempio: |
    INPUT UTENTE: "analizza il termine kavod in Ezechiele 1 in chiave fisica"
    AMAN COSTRUISCE (scratchpad nascosto):
    {
      meta: {obiettivo: "analisi fisica kavod", depth_level: 7, stile: "TECNICO"},
      dominio: {tipo: "TESTO", focus: "kavod Ezechiele 1"},
      dati: {testo: "kavod Ez 1", lingua_rilevata: "ebraico_biblico"},
      richiesta: {tipo: "ANALISI", strati_attivi: ["Σ0","Σ1","Σ2","Σ3","L_Spectrum","L_Omega","Σ7"]},
      control: {start: true, mode: "execute", axiom_zero: true}
    }
    → Validation Gate → routing a AION + L_Omega

