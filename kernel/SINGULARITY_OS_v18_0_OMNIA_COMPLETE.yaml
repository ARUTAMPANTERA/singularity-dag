      test: "L'apparato sintetizzato dovrebbe essere costruibile con materiali dell'epoca?"
      output_errore: "[ERRORE_DI_MODELLO: violazione {legge_fisica}] → downgrade a [IPOTESI 15%]"

  safety_check_sf:
    regola: |
      Se il risultato finale sembra fantascienza:
