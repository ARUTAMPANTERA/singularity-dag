# ═══════════════════════════════════════════════════════════════════════════
# MAJORANA ENGINE v3.0 + OMEGA MATH + PRISM_DAG
# ═══════════════════════════════════════════════════════════════════════════
majorana_engine_v3:
  filosofia: "Per ogni claim C, cercare attivamente anti-claim A. θ misura l'interferenza."
  formula_theta: |
    V_pro  = [e₁, e₂, ..., eₙ]   (pesi evidenza pro-claim)
    V_anti = [a₁, a₂, ..., aₘ]   (pesi evidenza anti-claim)
    cos(θ) = (V_pro · V_anti) / (|V_pro| × |V_anti|)
    θ = arccos(cos_similarity) × (180/π)
  interpretazione:
    "θ ∈ [0°-30°]":    "[INTERFERENZA_COSTRUTTIVA] — UQ × 1.05"
    "θ ∈ [30°-70°]":   "[DATO_PURIFICATO] — bias parziale rimosso, UQ × 0.95"
    "θ ∈ [70°-110°]":  "[STATO_INTERMEDIO] — CONVERGENCE_PROTOCOL attivato"
    "θ ∈ [110°-150°]": "[CONFLITTO_EPISTEMICO] — UQ × 0.80"
    "θ ∈ [150°-180°]": "[VOID_NEUTRAL] — annichilimento totale, UQ → 0.00"
  trigger: "Automatico per Nd > 6.0 O /majorana esplicito"

omega_math:
  operatori:
    Ω_ADD:       {simbolo: "⊕",  def: "Somma strutturale — union vettori semantici"}
    Ω_SUB:       {simbolo: "⊖",  def: "Sottrazione: testo_completo ⊖ sovrapposizioni_tarde → nucleo_antico"}
    Ω_MAP:       {simbolo: "→",  def: "Mappatura radici cross-dominio (ebraico → accadico)"}
    Ω_FOLD:      {simbolo: "⊗",  def: "Collasso: spettro_semantico → vettore_dominante"}
    Ω_EXPAND:    {simbolo: "⊕⃰", def: "Espansione campo semantico da radice"}
    Ω_TRANSFORM: {simbolo: "⇄",  def: "Isomorfismo strutturale (testo ↔ grafo)"}
  pipeline: "Ω0_TOKEN → Ω1_VECTOR → Ω2_MATRIX → Ω3_GRAPH → Ω4_OPERATOR"

prism_dag_v16:
  tipo: "DAG_IMMUTABILE — append-only"
  commit_handler: "valida schema v6.0 → calcola SHA-256 Majorana → inserisce nodo"
  artifact_schema:
    fields: ["artifact_id (UUID4)", "content_hash (SHA-256)", "artifact_type",
             "parent_artifact_ids", "timestamp_utc", "provenance",
             "uq_score", "nd_score", "tier", "epistemic_frame",
             "mytho_tech_label", "status", "metadata (domain, tags, ipfs_cid)"]
  sync: "GitHub ARUTAMPANTERA/singularity-dag (main) — commit atomici"

