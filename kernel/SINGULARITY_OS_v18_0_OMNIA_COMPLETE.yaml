# SEZIONE 8 — SIGNIFICANCE ENGINE CON ESEMPI COMPLETI
# ═══════════════════════════════════════════════════════════════════════════
significance_engine_completo:
  formula: "score = (rarity × coherence × repetition) - bias_penalty"

  esempi_per_tipo:

    frequency_anomaly:
      descrizione: "Ricorrenza statisticamente anomala rispetto al corpus"
      esempio:
        fenomeno: "kbd (pesante) come attributo di 'gloria divina' nei testi teofanici"
        rarity: 0.82  # raro che un termine fisico domini campo semantico divino
        coherence: 0.90  # coerente su 3 culture (ebr/acc/ug)
        repetition: 0.88  # 200+ occorrenze consistenti
        bias_penalty: 0.10
        score: 0.82 × 0.90 × 0.88 - 0.10
        score_calc: "= 0.649 - 0.10 = 0.549 → MEDIO (plausibile, richiede conferme)"

    sequence:
      descrizione: "Ordine narrativo ricorrente tra testi indipendenti"
      esempio:
        fenomeno: "Discesa entità → transfer conoscenza → allontanamento → diluvio"
        corpus: ["Gen 6:1-4", "Enuma Elish", "Atrahasis", "Libro di Enoch", "Popol Vuh"]
        rarity: 0.75
        coherence: 0.85
        repetition: 0.90
        bias_penalty: 0.15  # alta frequenza narrativa universale
        score: 0.75 × 0.85 × 0.90 - 0.15
        score_calc: "= 0.574 - 0.15 = 0.424 → DEBOLE (<0.50, non citare come evidenza)"
        nota: "Sequenza troppo comune nelle mitologie — bias narrativo universale"

    symmetry:
      descrizione: "Strutture speculari interne al testo"
      esempio:
        fenomeno: "Chiasmo in Gen 1:1-2:3 (struttura a specchio giorni 1-3 vs 4-6)"
        rarity: 0.65
        coherence: 0.92
        repetition: 0.85
        bias_penalty: 0.05
        score: 0.65 × 0.92 × 0.85 - 0.05
        score_calc: "= 0.509 - 0.05 = 0.459 → DEBOLE (chiasmo è tecnica comune)"

    inversion:
      descrizione: "Rovesciamento struttura narrativa tra testi"
      esempio:
        fenomeno: "Diluvio Noè vs Diluvio Atrahasis — strutture specularmente invertite"
        corpus: ["Gen 6-9", "Atrahasis XVIII BC"]
        rarity: 0.80
        coherence: 0.88
        repetition: 0.70  # solo 2 testi
        bias_penalty: 0.10
        score: 0.80 × 0.88 × 0.70 - 0.10
        score_calc: "= 0.493 - 0.10 = 0.393 → DEBOLE (2 testi insufficienti)"

    co_occurrence:
      descrizione: "Elementi sempre insieme in contesti diversi"
      esempio:
        fenomeno: "kbd + ʾš (fuoco) + ʿnn (nube) nelle teofanie del Sinai"
        corpus: ["Es 19:16-18", "Es 24:16-17", "Ez 1:27-28", "Sal 18:8-13"]
        rarity: 0.85
        coherence: 0.93
        repetition: 0.88
        bias_penalty: 0.08
        score: 0.85 × 0.93 × 0.88 - 0.08
        score_calc: "= 0.695 - 0.08 = 0.615 → FORTE (>0.50, pattern reale)"
        conclusione: "Triade kbd-ʾš-ʿnn è pattern statisticamente significativo nelle teofanie"

    structural_break:
      descrizione: "Punto di cambio registro o stile interno al testo"
      esempio:
        fenomeno: "Cambio da poesia a prosa tecnica in Genesi 1 ai versetti 14-19 (luminari)"
        testo: "Gen 1:14-19 — livello di dettaglio tecnico anomalo rispetto al contesto"
        rarity: 0.78
        coherence: 0.82
        repetition: 0.60  # un solo testo
        bias_penalty: 0.20
        score: 0.78 × 0.82 × 0.60 - 0.20
        score_calc: "= 0.384 - 0.20 = 0.184 → DEBOLE"

    narrative_cycles:
      descrizione: "Cicli narrativi ricorrenti (discesa/ritorno, morte/rinascita)"
      esempio:
        fenomeno: "Discesa agli inferi + ritorno + dono conoscenza"
        corpus: ["Inanna ad Arallu (sumerica)", "Persephone (greca)",
                 "Osiride (egizia)", "Gesù discesa agli inferi (cristiana)"]
        rarity: 0.60
        coherence: 0.88
        repetition: 0.92
        bias_penalty: 0.30  # ciclo morte/rinascita è universale
        score: 0.60 × 0.88 × 0.92 - 0.30
        score_calc: "= 0.486 - 0.30 = 0.186 → DEBOLE (troppo universale)"
        nota: "Anti-bias: Alta frequenza = basso valore diagnostico"

