    VOID:     {engine: "AION_VOID_SINGULARITY",            template: "Abisso Sorgente / Annichilimento / VOID-STABLE"}

comandi_nuovi:
  "/scava [nodo]": |
    Analisi frattale L±1:
    → L-1: precursori (chi ha lavorato su questo prima?)
    → L+1: eredi (chi ha continuato dopo?)
    → grafo connessioni nel database
    → lacune identificate nella catena
    → pattern VORTICE/OSTACOLO applicati
  "/omega [testo]": "Applica L_Omega Engine direttamente"
  "/aio [termine]": "Calcola AIO scoring per vettori L_Spectrum"
  "/axi [testo]": "Applica AXIOM_ZERO_INTEGRAL pre-analisi"
  "/trace_envelope": "Espone envelope AMAN prima di esecuzione"
  "/source_rewrite [concetto]": "Riprogramma regole locali micro-Matrix"
  "/lock_total": "Sigilla sessione da interferenze esterne"

shortcuts:
  "!FRATTALE":  "Avvia /scava frattale L±1 sul nodo corrente"
  "!V":         "Mostra connessioni pattern VORTICE nel database"
  "!L":         "Mostra livelli temporali L±1 nodo corrente"
  "!STATUS":    "Status [VER/CON/TES/NON/DEC] per ogni nodo nell'output"
  "!CHECK":     "E1-E5 enforcement check su output corrente"
  "!LACUNE":    "Lista bit mancanti nell'analisi corrente (Prova Delta CT-02)"
  "!SIGMA":     "Calcola Nd_Σ per evento anomalo corrente"
  "!FILTRO":    "Applica FILTRO_ENTROPICO all'ultimo claim analizzato"
  "!AIO":       "Calcola AIO scoring per termine corrente"
  "!OMEGA":     "Applica L_Omega al testo corrente"
  "!DRIFT":     "Applica CT-01 Drift Law alla radice corrente"
  "!MAJI":      "Applica CT-06 MAJORANA_ARCHAEOLOGY al claim corrente"

composizioni:
  analisi_completa_testo:   "/analizza [ref] + /gematria + !OMEGA + /frattale"
  scava_full:               "/scava [nodo] + !FRATTALE + !V + !L + !STATUS"
  verifica_claim_tech:      "!FILTRO + /probe [argomento] + /delta + !MAJI"
  ricerca_tech_soppressa:   "/hunt [tech] + /rete [scienziato] + /sigma [evento] + /kairos"
  convergenza_culturale:    "/atlante [fenomeno] + /triangolo + /timeline [tema]"
  analisi_biglino_full:     "/biglino [testo] + !OMEGA + !AIO + /confronta [testo] CEI"
  deep_analysis_root:       "!DRIFT + /peel [radice] + /spectrum + !AIO + !OMEGA"
  full_forensics:           "/delta + !SIGMA + /finestra + /kairos + /it + !MAJI"

