      - "Leiden markers per lacune ([...]) e incertezze"
      - "PELA-13 o sistema dichiarato"
      - "Nessuna aggiunta vocalica"
    lock: "AL_L16, AL_L17"
    esempio: |
      KBD (כבד) → PELA-13: k-b-d
      [Leiden: lacuna di 3 segni] → [...]

  Σ2:
