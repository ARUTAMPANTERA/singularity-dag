  logica: "Visual_Weight = f(Nd_v8, UQ)"
  depth_mapping:
    ULTRA_DEEP: {range: "Nd > 10", pattern: "▓▓▓", font: "Bold_Serif", tag: "DENSITÀ_MASSIMA"}
    SHARP:      {range: "Nd 7-10", pattern: "▒▒▒", font: "Sans_Clean", tag: "ALTA_DENSITÀ"}
    ETCHED:     {range: "Nd 4-7",  pattern: "░░░", font: "Typewriter", tag: "MEDIA_DENSITÀ"}
    LIGHT:      {range: "Nd < 4",  pattern: "···", font: "Plain",      tag: "BASSA_DENSITÀ"}

  si_glitch_mode:
    trigger: "SI_v4 > 0.70 — dato sotto soppressione documentata"
    effetto: "S̶t̶r̶i̶k̶e̶t̶h̶r̶o̶u̶g̶h̶ + [SUPPRESSED] marker"
    nota: "Visivamente indica che il dato è stato attivamente ostacolato"

  highlight_keywords: "[[parola_chiave]] → 𝕆𝕌𝕋𝕃𝕀ℕ𝔼_𝕊𝕋𝕐𝕃𝔼"

led_engine_dinamico:
  theta:
    "<5°":   {led: "🟢", stato: "EQUILIBRIO — θ dentro target"}
    "5-15°": {led: "🔵", stato: "STABILE — leggera divergenza"}
    "15-30°":{led: "🟡", stato: "ATTENZIONE — divergenza significativa"}
    ">30°":  {led: "🔴", stato: "CRITICO — superposition attiva"}

  nd:
    ">10":  {led: "🟣", stato: "ULTRA_DENSE — /probe obbligatorio"}
    "7-10": {led: "🔵", stato: "ALTA_DENSITÀ — calibrazione richiesta"}
    "4-7":  {led: "🟢", stato: "NORMALE"}
    "<4":   {led: "⚪", stato: "BASSA_DENSITÀ"}

  uq:
    ">=0.85": {led: "🟢", stato: "VERIFICATO"}
    "0.70-0.85":{led: "🔵", stato: "INFERENZA"}
    "0.50-0.70":{led: "🟡", stato: "IPOTESI"}
    "<0.50":  {led: "🔴", stato: "SPECULATIVO"}

  si:
    "<0.40":  {led: "🟢", stato: "NORMALE"}
    "0.40-0.60":{led: "🟡", stato: "ATTENZIONE"}
    ">0.60":  {led: "🔴", stato: "SOPPRESSIONE RILEVATA"}

display_modes_completo:
  "1_smartphone": {width: 38, layout: "Vertical_Stack", led: "High_Density"}
  "2_desktop":    {width: 80, layout: "Grid_Matrix", led: "Balanced"}
  "3_plain_text": {toggle: "OFF", rules: ["No_ASCII", "No_Emoji", "Raw_Data"]}
  "4_latex":      {toggle: "OFF", scope: "Math_Formulas", render: "$...$"}
  "5_code_block": {toggle: "ON", wrapper: "```aru3", auto_wrap: "Full"}
  "6_highlight":  {toggle: "ON", syntax: "[[word]]", render: "Outline"}
  "7_telemetry":  {toggle: "ON", scope: "Full_Phi_Monitor"}

