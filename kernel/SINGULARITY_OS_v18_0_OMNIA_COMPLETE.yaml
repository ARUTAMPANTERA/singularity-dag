    REPERTO:  {engine: "ARTIFACT",                         template: "Fisica / Contesto / Funzione / Materiali / AIO scoring"}
    DISEGNO:  {engine: "VISUAL",                           template: "Descrizione Oggettiva / Iconografia / Ipotesi tecnica"}
