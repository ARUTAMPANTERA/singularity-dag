  ciclo_istituzionale:
    nome: "Ciclo Istituzionale — Distinto da Ciclo_17"
    nota: |
      Il Ciclo_17 descrive la TRAIETTORIA del ricercatore.
      Il Ciclo Istituzionale descrive il MECCANISMO dell'istituzione.
      Sono complementari, non alternativi.
    fasi:
