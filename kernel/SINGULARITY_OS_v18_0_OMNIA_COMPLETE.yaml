      Input: "In principio Elohim creò i cieli e la terra"
      FASE_1: [eliminati: principio→timestamp, creò→azione]
      FASE_2: BRA=configurazione, ShMY=espansione verticale, ARtS=base orizzontale
      FASE_3: ELOHIM_CONFIGURÒ [separazione_fase] ShMY [campo_verticale] + ARtS [piano_base]
      FASE_4: Separazione di due stati: campo verticale ionizzato + superficie planare densa
