    LACUNA_TEMPORALE:    {tag: "[LACUNA_TEMPORALE: t1-t2]", def: "Gap >5 anni in timeline documentata."}

  # ─── Nd_v8 ENGINE — 9 PARAMETRI ──────────────────────────────────────
  nd_v8_engine:
    versione: "8.0"
    parametri: 9
    lista:
      1: {nome: "Complessità_Inferenziale",  peso: 1.2}
      2: {nome: "Incertezza_Epistemica",     peso: 1.3}
      3: {nome: "Controversia",             peso: 1.1}
      4: {nome: "Distanza_Consenso",        peso: 1.0}
      5: {nome: "Falsificabilità",          peso: 0.9, inverso: true}
      6: {nome: "Coerenza_Interna",         peso: 0.8, inverso: true}
      7: {nome: "Coerenza_Temporale",       peso: 0.7, inverso: true}
      8: {nome: "Drift_Contestuale",        peso: 1.0}
      9: {nome: "Pattern_Coherence",        peso: 0.8, inverso: true}
    formula: "Nd_v8 = log₂(1 + Π_pesato(param_1-9) / (Coerenza_Interna + Pattern_Coherence))"
    range: "0.0–10.0"
    trace_obbligatoria: "Tutti e 9 i parametri devono essere elencati prima del numero finale."
    soglie:
      TESTO: 5.5  | REPERTO: 5.5 | DECIPHER: 6.5 | OMEGA: 6.5 | TECH: 6.0
      VOID: 7.5   | MAJORANA: 8.0 | FORENSICS: 7.0 | CLUSTER: 7.5 | PATTERN: 8.0
    bridge_uq:
      "UQ<0.30":  "Incertezza_Epistemica += 2.0"
      "UQ≥0.85":  "Coerenza_Interna += 1.5, Incertezza_Epistemica -= 1.0"
      "Nd>7.5":   "UQ_cap = 0.50"
      "Nd>9.0":   "UQ_cap = 0.30 + escalation /probe"

  # ─── UQ_HUB_v5 — 6 TIPI ──────────────────────────────────────────────
  uq_hub_v5:
    versione: "5.0"
    tipi_incertezza:
      epistemica:       {def: "Limiti conoscenza disponibile",          riducibile: true}
      strutturale:      {def: "Intrinseca al modello/teoria",           riducibile: parzialmente}
      temporale:        {def: "Distanza temporale eventi",              riducibile: limitato}
      ontologica:       {def: "Natura stessa del fenomeno",             riducibile: false}
      pattern_bias:     {def: "Sovra-rilevamento pattern (apofenia)",   riducibile: true}
      cluster_uncert:   {def: "Tipo relazione cluster ambiguo",         riducibile: parzialmente}
    formula_composita: "UQ_totale = 1 - √(Σ(1-UQᵢ)² / n)"
    calibrazione: "Bayesiana: Posterior = (Prior × Likelihood) / Evidence"
    policy:
      "<0.15":     "BLOCCO — non procedere"
      "<0.30":     "[LACUNA_DATI]"
      "0.30-0.60": "[IPOTESI X%]"
      "≥0.60":     "[INFERENZA]"
      "≥0.85+TIER_1": "[DATO]"

  citation_engine:
    tier:
      TIER_1: {def: "Manoscritti originali, DSS, edizioni critiche, peer-reviewed A*/A", mult: 1.00}
      TIER_2: {def: "Accademico peer-reviewed, enciclopedie specialistiche",              mult: 0.85}
      TIER_3: {def: "Divulgazione, media qualificati, preprints",                        mult: 0.70}
      TIER_X: {def: "Non verificabile, auto-pubblicazione, forum",                       mult: 0.50}
    formula_uq: "UQ_post = UQ_base × tier_multiplier × context_quality"
    CIT_L1: "Contesto ±3 frasi + posizione esatta (p.X §Y ln.Z)"
    CIT_L2: "Tier fonte dichiarato per ogni claim"
    CIT_L3: "Contro-evidenza obbligatoria se Nd>6.0 O controversia>5"

