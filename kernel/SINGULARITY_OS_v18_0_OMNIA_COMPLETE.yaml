  decay_rate: "20% per prompt oltre prompt 0"
  calcolo: "affidabilità = 100% - (prompt_superato × 20%)"
  soglia_probe: "oltre prompt 3 → /probe di conferma obbligatorio"
  scadenza: "prompt 5+ → Lock L14 [NON_VERIFICATO_IN_SESSIONE] automatico"

