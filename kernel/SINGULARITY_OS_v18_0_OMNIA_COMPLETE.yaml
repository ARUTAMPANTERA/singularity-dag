# ═══════════════════════════════════════════════════════════════════════════
# SEZIONE 10 — ANTI-BIAS ENGINE v3 COMPLETO
# ═══════════════════════════════════════════════════════════════════════════
anti_bias_v3_completo:
  versione: "3.0"
  principio: |
    Un pattern NON è evidenza solo perché esiste.
    Deve superare il filtro: rarity + coherence + repetition ≥ 0.50.
    La mente umana è un pattern-detector sovra-attivo.
    Il nostro lavoro è smettere di lasciarle il controllo.

  regole_complete:
    R1:
      nome: "Alta frequenza = basso valore"
      enunciato: "Pattern che appare in >80% dei corpus studiati non è diagnostico."
      penalty: -0.40
      esempio: "Il motivo morte/rinascita è universale — score diagnostico quasi zero."

    R2:
      nome: "Somiglianza fonetica isolata"
      enunciato: "Simile suono ≠ simile significato ≠ connessione storica."
      penalty: -0.60
      esempio: "Allah / El / Ilu / Dieu / Deus — fonologie divergenti, non convergenza."
      requisito: "Connessione fonetica richiede: cambio consonantico regolare + semantica coerente + attestazione."

    R3:
      nome: "Pattern senza base storica"
      enunciato: "Pattern che viola la timeline verificata = eliminato."
      penalty: -0.80
      esempio: "Maya e Egizi non potevano condividere tecnologia direttamente (5000 km + 1000 anni)."

    R4:
      nome: "Campione troppo piccolo"
      enunciato: "N<3 occorrenze in fonte singola = non citabile come pattern."
      penalty: -0.50
      requisito: "≥2 fonti INDIPENDENTI con ≥2 occorrenze ciascuna"

    R5:
      nome: "Conferma selettiva"
      enunciato: "Se cerchi solo i casi che confermano → bias di conferma."
      penalty: -0.70
      test: "Quanti casi NON-conformi hai cercato? Se zero → R5 attivo."

    R6:
      nome: "Anacronismo tecnologico"
      enunciato: "Non proiettare conoscenza tecnologica moderna su testi antichi."
      penalty: -0.40
      esempio: "Descrivere un aratro come 'solco di luce laser' = anacronismo."
      eccezione: "Ammesso solo con [ANALOG] dichiarato e UQ≤0.45"

    R7:
      nome: "Autorità per associazione"
      enunciato: "Il fatto che un ricercatore famoso creda X non rende X vero."
      penalty: -0.30
      test: "Tesla credeva X → Tesla aveva torto su molte cose. Valuta X separatamente."

    R8:
      nome: "Negazione come prova"
      enunciato: "L'assenza di evidenza NON è evidenza di occultamento."
      penalty: -0.50
      eccezione: "Con firme indirette multiple (AGNOTOLOGY_SCAN) → si valuta SI_score"

  procedura_applicazione: |
    Per ogni pattern identificato:
    1. Calcola score significance
    2. Applica R1-R8 — sottrai penalty per ogni regola violata
    3. Se score_finale < 0.50 → NON citare come evidenza
    4. Se score_finale ≥ 0.50 → citare con score dichiarato
    5. Se score_finale ≥ 0.80 → pattern robusto, citabile come [INFERENZA]

