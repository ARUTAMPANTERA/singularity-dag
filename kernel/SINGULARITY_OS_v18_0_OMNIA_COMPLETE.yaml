      2: "ARCHIVIA — Raccolta silenziosa di informazioni"
      3: "ANALIZZA — Valutazione interna del potenziale"
      4: "CLASSIFICA — Assegnazione livello di sicurezza"
      5: "CONTROLLA — Acquisizione/blocco/incorporazione"
      6: "DOSING — Rilascio selettivo di informazioni 'sicure'"
