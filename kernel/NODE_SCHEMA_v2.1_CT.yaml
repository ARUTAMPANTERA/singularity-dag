    obbligatorio_se: "status IN [CONTROVERSO, SOPPRESSO, SEMPLIFICATO]"

  domande_aperte_da_chiudere:
    tipo: array_string
    desc: "Lista di azioni concrete per completare la ricerca sul nodo"
    esempio:
      - "Esiste documentazione X in archivio Y? Richiedere FOIA."
      - "Il rapporto Z è consultabile?"

  fonti_perse_o_secretate:
    tipo: array_string
    desc: "Documenti che sappiamo esistere ma non accessibili"

  media_esistenti:
    tipo: array_object
    schema: "{tipo: string, desc: string, dove: string, accesso: string}"
    desc: "Materiale fisico o digitale esistente (filmati, foto, hardware)"

  stato_disponibilita:
    tipo: string
    desc: "Stato attuale dell'accesso ai documenti e materiali"

  l_minus_1_precursors:
    tipo: array_string
    desc: "Chi ha lavorato su questo prima — frattale L-1"

  l_plus_1_heirs:
    tipo: array_string
    desc: "Chi ha continuato dopo — frattale L+1"

  hub_collisione:
    tipo: array_string
    desc: "Luoghi fisici dove questo nodo incontra altri (laboratori, conferenze)"

  cluster:
    tipo: array_string
    desc: "Pattern Rete Eter attivi sul nodo"
    valori_possibili:
      - "VORTICE"
      - "FREQUENZE"
      - "MONOPOLO"
      - "ZERO_POINT"
      - "OSTACOLO"
      - "CICLO_ISTITUZIONALE"
      - "ITALIA_SEGRETA"
      - "RS33"
      - "SOPPRESSO_MILITARE"
      - "SOPPRESSO_CORPORATIVO"
      - "SOPPRESSO_MEDICO"
      - "SOPPRESSO_ACCADEMICO"
      - "BIOFISICA_NON_CONVENZIONALE"
      - "LENR"
      - "VIROLOGIA"

  impatto_storico:
    tipo: string
    desc: "Impatto verificato sul mondo reale"
    obbligatorio: true

  impatto_potenziale:
    tipo: string
    desc: "Impatto ipotetico se verificato o completato"
    obbligatorio: true

