mythotech_ensemble:

  no_erasure_protocol:
    principio: "Separazione a livello DATA FRAME. Mai a livello dato grezzo."
    label_obbligatoria: "MYTHOLOGICAL | TECHNOLOGICAL | HYBRID | NEUTRAL"
