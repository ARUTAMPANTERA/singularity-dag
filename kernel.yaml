  checks:
    lock_totali:   {target: 260,       fail: "HALTED"}
    lock_v3:       {target: 150,       fail: "CRITICAL — ALTARE COMPROMESSO"}
    lock_v19:      {target: 110,       fail: "CRITICAL — GOVERNANCE CORROTTA"}
    theta_global:  {target: "<=5 gradi", warn: "5-10 gradi", critical: ">10 gradi"}
    si_global:     {target: "<=0.45",  warn: "0.45-0.60",  critical: ">0.60"}
    uq_system:     {target: ">=0.88",  warn: "0.75-0.88",  critical: "<0.75"}
    dag_integrity: {target: "aciclico + hash chain intatta", fail: "ROLLBACK"}
    language_lock: {target: "ITALIANO", fail: "Override esplicito richiesto"}
    altare_sealed: {target: "v3.0 montato in /sys/epistemic", fail: "HALTED IMMEDIATO"}

