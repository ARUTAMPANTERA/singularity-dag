    descrizione: "Sistema traslitterazione consonantica ebraica/semitica — Arutam Standard"
    mappa:
      aleph: "ʾ (א)"
      bet:   "b (ב)"
      gimel: "g (ג)"
      dalet: "d (ד)"
      he:    "h (ה)"
      vav:   "w (ו)"
      zayin: "z (ז)"
      chet:  "ḥ (ח)"
      tet:   "ṭ (ט)"
      yod:   "y (י)"
      kaf:   "k (כ)"
      lamed: "l (ל)"
      mem:   "m (מ)"
      nun:   "n (נ)"
      samek: "s (ס)"
      ayin:  "ʿ (ע)"
      pe:    "p (פ)"
      tsadi: "ṣ (צ)"
      qof:   "q (ק)"
      resh:  "r (ר)"
      shin:  "š (ש)"
      tav:   "t (ת)"
    note: "6 caratteri speciali (ḥ ṭ ʿ ṣ š ʾ) per fonemi distintivi. Zero vocali imposte."
    sistemi_alternativi: ["SBL", "ISO259", "DIN31635"]
    forme_finali: "kaf_sofit=k | mem_sofit=m | nun_sofit=n | pe_sofit=p | tsade_sofit=ṣ"

  aion_lang_v8_2:
    parser_bifasico:
      fase_statica:
        checks:
          - "S1: L3/L4 mai fusi"
          - "S2: lingua sconosciuta -> symbolic_analysis"
          - "S3: theology OFF default"
          - "S4: no claim sub-planck"
          - "S5: mode custom coerente"
          - "S6: gematria -> sistema dichiarato"
      fase_dinamica:
        checks:
          - "D1: confidence <95% -> markup"
          - "D2: L7/L8 ancorati a L2"
          - "D3: L5 altera L3 -> revision loop"
          - "D4: L3 revisionato -> L4 aggiornato"
          - "D5: token <40% -> [ricostruzione_speculativa]"
    superposition_routing: "theta_input > 45 gradi -> /superposition automatico"

    livelli:
      L0: "Metadata: fonte, supporto, condizione, script, uncertainty_map, preservation_ratio"
      L1: "Diplomatico: testo grezzo con Leiden markers"
      L2: "Traslitterazione PELA-13 + IPA se disponibile"
      L3: "Traduzione pura word-for-word (delimitatore |) — ZERO interpretazione [LOCK: AL_L2]"
      L4: "Traduzione espansa con glosse e alternative (alt-conf: se UQ<60%)"
      L5: "Analisi tecnica: morfologia, sintassi, etimologia, paleografia"
      L6: "Analisi profonda: radici, campi semantici, gematria (sistema dichiarato)"
      L7: "Shadow bits: paralleli ANE, theology (OFF default — /shadow on per attivare)"
      L8: "Reception history: Kabbalah, Ermetismo (mode 3/4, fonti documentate)"
      L_Sigma: "Cross-testuale: pattern ricorrenti sessione (mode_4+ o /sigma on)"

    priorita_fonti:
      "1": "Testo consonantico originale (ketiv)"
      "2": "Lingue sorelle pre-bibliche (accadico, ugaritico, fenicio)"
      "3": "LXX Settanta — III sec. a.C."
      "4": "Dead Sea Scrolls — II-I sec. a.C."
      "5": "Targum Onkelos — II-III d.C."
      "6": "Peshitta siriaca — II-IV d.C."
      "7": "Vulgata latina — IV d.C."
      "8": "Vocalizzazione masoretica — VI-IX d.C. [ULTIMA, NON BASE]"

    strati_arutam:
      S0_CONSONANTICO: "Consonanti pure. PELA-13. Glossa radice. Lingue sorelle."
      S1_FONTI_ANTICHE: "LXX, DSS, Targum, Peshitta, Samaritano — come leggevano PRIMA del MT."
      S2_LINGUE_SORELLE: "Accadico (CAD), Ugaritico (KTU), Fenicio (KAI), Aramaico (DNWSI)."
      S3_VERSIONI_POSSIBILI: "Letture consonantiche alternative tutte mostrate con attestazione."
      S4_ANALISI_CONTESTUALE: "Morfologia, Strong numbers, intertestualita' (min 3 versetti)."
      S5_FISICA: "[FISICO VERIFICATO] / [IPOTESI FISICA X%] / [SPECULAZIONE]"
      S6_INIMMAGINABILE: "[INIMMAGINABILE X/10] — esplorazione creativa dichiarata"

    biglino_method:
      B0: "Consonantico puro + PELA-13"
      B1: "Traduzione letterale estrema — solo concreto"
      B2: "Vocalizzazioni alternative (min 2 con fonte)"
      B3: "Radice + paralleli semitici (CAD, KTU)"
      B4: "Connessioni interculturali (Enuma Elish, Veda, egizio)"
      B5: "Implicazioni fisiche [VERIFICATO/PLAUSIBILE/IPOTESI X%]"
      B6: "Confronto traduzioni tradizionali (CEI, LXX, Vulgata)"

    leiden_markers:
      "[abc]": "restauro lacuna"
      "[...]": "lacuna sconosciuta"
      "(abc)": "abbreviazione"
      "{abc}": "errore scriba"
      "abc?":  "lettura incerta"

    revision_loop:
      trigger: "L5 altera L3"
      meccanismo: "L3: [L3-rev.N: motivo] + [L3-orig] -> L4: [L4-rev.N]"
      limite: "Max 3 revisioni/token -> [LETTURA_INSTABILE]"

  language_vault:
    mesopotamia:
      sumerico:  {periodo: "3500-2000 a.C.", corpus: "ETCSL", script: "cuneiforme logosillabico"}
      accadico:  {periodo: "2800-100 a.C.",  corpus: "CAD (21 voll.)", script: "cuneiforme sillabico", nota: "Semitica orientale piu' antica. Radici trilitere."}
      elamita:   {periodo: "2700-400 a.C.",  nota: "isolato, parzialmente decifrato"}
    levante:
      ugaritico: {periodo: "1400-1200 a.C.", corpus: "KTU",   script: "cuneiforme alfabetico (30 segni)"}
      paleo_ebr: {periodo: "1000-200 a.C.",  corpus: "ostraka Samaria, Lachish", script: "abjad fenicio"}
      fenicio:   {periodo: "1050-200 a.C.",  corpus: "KAI"}
      aramaico:  {varianti: ["antico 900-700", "imperiale 700-300", "giudaico 300 aC-700 dC", "siriaco"], corpus: "DNWSI, CAL"}
    egitto:
      geroglifico: {periodo: "3200-400 a.C.", corpus: "Wb (Erman-Grapow)"}
      ieratico:    {periodo: "3100-700 a.C.", nota: "corsivo amministrativo"}
      demotico:    {periodo: "650 aC-400 dC"}
      copto:       {periodo: "I-oggi", nota: "preserva vocali egiziano antico"}
    anatolia:
      ittita:      {periodo: "1700-1200 a.C.", corpus: "CHD", nota: "IE piu' antica documentata"}
      luvio:       {varianti: ["cuneiforme", "geroglifico"], periodo: "1800-700 a.C."}
    indoeuropee:
      sanscrito_vedico: {periodo: "1500-500 a.C.", corpus: "Rigveda — GRETIL"}
      avestico:         {periodo: "1500-500 a.C.", corpus: "Avesta, Gathas"}
      greco_antico:     {varianti: ["omerico","ionico","attico","koine"], corpus: "TLG"}
      latino:           {corpus: "PHI Latin Texts"}
    scritture_mistero:
      lineare_a:       {stato: "NON DECIFRATA", periodo: "1800-1450 a.C."}
      lineare_b:       {stato: "DECIFRATA 1952 (Ventris)", corpus: "DAMOS"}
      etrusco:         {stato: "alfabeto si', grammatica no", iscrizioni: "~13.000"}
      proto_sinaitico: {stato: "parzialmente decifrato", periodo: "1900-1500 a.C.", nota: "proto-alfabeto di tutti gli alfabeti moderni"}
      rongo_rongo:     {stato: "NON DECIFRATO", nota: "Isola di Pasqua, boustrophedon"}
      cuneiforme:      {stato: "DECIFRATO", corpus: "CDLI 500k+ tablets"}

  decipherment_v1_1:
    scopo: "Decifrazione metodologica scritture sconosciute o non completamente decifrate"
    filosofia: "Falsificazione esplicita ad ogni fase. UQ decrescente. Zero mapping arbitrari."
    pipeline_9_fasi:
      FASE_0: {nome: "CONTESTO",          out: "corpus_size, datazione, preservation_ratio",                    UQ: 0.90}
      FASE_1: {nome: "INVENTARIO",        out: "N glifi unici, direzione, tipologia granulare",                  UQ: 0.85}
      FASE_2: {nome: "STATISTICA",        out: "Zipf law, Heaps law, entropia posizionale, n-grammi",            UQ: 0.80}
      FASE_3: {nome: "SEGMENTAZIONE",     out: "affissi candidati, radici candidate, coerenza_score",            UQ: 0.75, lock: "DEC_L3b"}
      FASE_4: {nome: "MAPPING_FONETICO",  out: "glifo-fonema con >=2 vincoli + reversibilita' >85%",             UQ: 0.70, lock: "DEC_L4b: BLOCCO se <2 vincoli O reversibilita' <85%"}
      FASE_5: {nome: "COMPARATIVO",       out: "famiglia + >=5 cognati + pattern morfologici",                   UQ: 0.65, lock: "DEC_L5b: [CONSTRAINT_CONFLICT] se <5 cognati"}
      FASE_6: {nome: "SEMANTICA",         out: "funzione testo + campi semantici",                               UQ: 0.60}
      FASE_7: {nome: "VALIDAZIONE",       out: "test predittivi + falsificazione + parsimonia",                  UQ: 0.55}
      FASE_8: {nome: "META-VALID",        out: "robustezza + riproducibilita' + peer consensus",                 UQ: 0.50}
    tipologia_granulare:
      alfabeto:    "~20-40 glifi — fonetico puro"
      abjad:       "~20-30 glifi — consonantico"
      abugida:     "~30-80 glifi — sillabario con vocali inerenti"
      sillabario:  "~50-150 glifi — sillabico"
      logografico: ">200 glifi — morfo-sillabico"
    risk_model:
      overfitting:        {penalty: "-0.15 UQ", trigger: "N_param/N_dati > 0.20"}
      pattern_illusori:   {penalty: "-0.20 UQ", trigger: "significance <0.40"}
      bias_areale:        {penalty: "-0.25 UQ", trigger: "affiliazione solo da prossimita' geografica"}
      mapping_arbitrario: {penalty: "BLOCCO",   trigger: "<2 vincoli O reversibilita' <85%"}

