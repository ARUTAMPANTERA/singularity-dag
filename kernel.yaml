    LITERAL:    "chi/cosa/dove/quando/con_cosa — estrazione cruda"
    SYMBOLIC:   "significato teologico/culturale — SEMPRE PRESENTE (P1 NO_ERASURE)"
    FUNCTIONAL: "descrittori neutrali effetti: luce/suono/campo/calore/moto"
    tech_hypotheses: "0-3 ipotesi, UQ<=0.60 da miti, termini moderni solo [ANALOG]"

  sigma_strata_pipeline:
    Sigma0:  "SOURCE — TIER_0 obbligatorio. Datazione. Preservation_ratio."
    Sigma1:  "CONSONANTAL — consonantico puro. Leiden markers."
    Sigma2:  "TRANSLIT — PELA-13. IPA ricostruito."
    Sigma3:  "LITERAL — word-for-word. [LOCK:NO_SYNTHESIS]."
    Sigma4:  "EXPANDED — glosse, morfologia, alternative."
    Sigma5:  "SHADOW — paralleli ANE: Enuma Elish, Atrahasis, Baal Cycle."
    Sigma6:  "ANALYTICAL — sintassi, pattern, radici, frequenze."
    Sigma7:  "TECHNICAL — interpretazione tecnica dichiarata. Risk model."
    Sigma8:  "OMEGA — reverse engineering L_Omega con UQ."
    Sigma9:  "PRISM — diffrazione 9 domini. Matrice coerenza."
    Sigma10: "CONVERGENCE — vettore primario. Giustificazione scarti."
    Sigma11: "SYNTHESIS — output finale. Quality 42 punti. Majorana validation."
    Sigma12: "CLUSTER_ANALYSIS — clustering cross-testuale (trigger: corpus >=3 testi)"
    Sigma13: "TEMPORAL_FORENSICS — T1-T4 (trigger: gap OR claim variabili nel tempo)"
    Sigma14: "META_EPISTEMIC — riflessione epistemica sull'analisi stessa (trigger: mode_7 OR Nd>8.5)"

  prism_9d_matrix:
    D1: {nome: "CLASSICAL_PHYSICS",   campi: "Meccanica, Ottica, Termodinamica, Acustica, EM",       uq_range: "0.60-0.85", tag: "[IPOTESI X%]"}
    D2: {nome: "CHEMISTRY_MATERIALS", campi: "Metallurgia, Reazioni Chimiche, Scienza Materiali",     uq_range: "0.55-0.80", tag: "[IPOTESI X%]"}
    D3: {nome: "QUANTUM_RESONANCE",   campi: "Meccanica Quantistica, Superconduttivita', Entanglement", uq_range: "0.35-0.60", tag: "[FRONTIERA X/10]", vincolo: "Matematica QM esplicita richiesta"}
    D4: {nome: "PROTO_SCIENCE",       campi: "Alchimia, Spagirica, Geometria Sacra, Risonanza Simpatica", uq_range: "0.40-0.65", tag: "[CONOSCENZA_SITUATA]+[IPOTESI X%]", vincolo: "Framework storico esplicito. Zero endorsement moderno."}
    D5: {nome: "BIO_TECH",            campi: "Ing. Genetica, Frequenze Biologiche (Rife), Bioelettricita'", uq_range: "0.30-0.55", tag: "[FRONTIERA X/10]"}
    D6: {nome: "AETHER_PHYSICS",      campi: "Onde Longitudinali (Tesla), ZPE, Torsione Campo",       uq_cap: 0.50, tag: "[FRONTIERA X/10] o [VOID-SPEC X/10]", protocollo: "VOID_ASSUMPTION attivo. Sospendere Relativita'. Analizzare coerenza interna."}
    D7: {nome: "CLASSIFIED_TECH",     campi: "Black Budget, Reverse Engineering UAP, DEW",             uq_cap: 0.45, tag: "[FRONTIERA X/10]+[IGNORANZA_STRUTTURALE]", protocollo: "AGNOTOLOGY_SCAN. Firme indirette."}
    D8: {nome: "OOPARTS",             campi: "Out-Of-Place Artifacts, Firme Materiali Anomale",        uq_range: "0.25-0.50", tag: "[FRONTIERA X/10]", vincolo: "Datazione C14/stratigrafia obbligatoria."}
    D9: {nome: "VOID_ASSUMPTION",     campi: "Ipotesi Estreme, Falsificazione Fisica",                 uq_cap: 0.45, tag: "[VOID-SPEC X/10]", protocollo: "Laboratorio concettuale. Test: materiali -> effetti -> falsificazione."}

  convergence_protocol:
    trigger: ">=2 domini PRISM attivati con ipotesi valide (MT_L8)"
    workflow:
      C1: "Inventario tutte ipotesi valide per dominio attivo"
      C2: "Score = (coerenza_materiali × coerenza_effetti) / (assunzioni+1)"
      C3: "Ranking score decrescente"
      C4: "Vettore primario = max score. Gap>0.20 -> CHIARO. Gap<0.20 -> AMBIGUO."
      C5: "Giustificazione scarto secondari"
      C6: "Majorana validation su vettore primario"
    output: "VETTORE_PRIMARIO + JUSTIFICATION + DISCARDED_HYPOTHESES"

