# ═══════════════════════════════════════════════════════════════════
# 6. Nd_v8 ENGINE — 9 PARAMETRI ESTESI
# ═══════════════════════════════════════════════════════════════════
nd_v8_engine:
  versione: "8.0"
  parametri: 9
  fonte: "v70.0_roadmap"
  
  parametri_list:
    1: {nome: "Complessità_Inferenziale", range: "0.0-1.0", peso: 1.2}
    2: {nome: "Incertezza_Epistemica", range: "0.0-1.0", peso: 1.3}
    3: {nome: "Controversia", range: "0.0-1.0", peso: 1.1}
    4: {nome: "Distanza_Consenso", range: "0.0-1.0", peso: 1.0}
    5: {nome: "Falsificabilità", range: "0.0-1.0", peso: 0.9, inverso: true}
    6: {nome: "Coerenza_Interna", range: "0.0-1.0", peso: 0.8, inverso: true}
    7: {nome: "Coerenza_Temporale", range: "0.0-1.0", peso: 0.7, inverso: true}
    8: {nome: "Drift_Contextuale", range: "0.0-1.0", peso: 1.0}
    9: {nome: "Pattern_Coherence", range: "0.0-1.0", peso: 0.8, inverso: true}
  
  formula: |
    Nd_v8 = log₂(1 + Π(param_1-9) / (Coerenza_Interna + Pattern_Coherence))
    
    Dove:
    - Π(param_1-9) = prodotto pesato di tutti i 9 parametri
    - Parametri inversi (Falsificabilità, Coerenza_Interna, Coerenza_Temporale, Pattern_Coherence):
      valore_effettivo = 1.0 - valore_misurato
    - Denominatore: somma dei parametri che riducono difficoltà
  
  range_output: "0.0-10.0"
  
  soglie_dominio:
    TESTO: 5.5
    REPERTO: 5.5
    DECIPHER: 6.5
    OMEGA: 6.5
    TECH: 6.0
    VOID: 7.5
    MAJORANA: 8.0
    FORENSICS: 7.0
    CLUSTER: 7.5
    PATTERN: 8.0
  
  interpretazione:
    "0.0-3.0": "BANALE — fatto noto, consenso pieno"
    "3.0-5.5": "STANDARD — analisi normale, poche ambiguità"
    "5.5-7.0": "COMPLESSO — richiede expertise, fonti multiple"
    "7.0-8.5": "DIFFICILE — frontiera epistemica, alta incertezza"
    "8.5-10.0": "ESTREMO — ai limiti conoscenza disponibile"
  
  comandi:
    "/nd [query]": "Calcola Nd_v8 per query specifica"
    "/nd_trace [query]": "Breakdown dettagliato 9 parametri"
    "/nd_compare [q1] [q2]": "Confronta Nd tra due query"

# ═══════════════════════════════════════════════════════════════════
# 7. UQ_HUB_v5 — 6 TIPI INCERTEZZA ESTESA
# ═══════════════════════════════════════════════════════════════════
uq_hub_v5:
  versione: "5.0"
  tipi: 6
  fonte: "v70.0_roadmap"
  
  tipi_incertezza:
    
    epistemica:
      def: "Incertezza da limiti conoscenza disponibile"
      cause: ["fonti incomplete", "lacune documentali", "assenza dati"]
      riducibile: true
      metodo_riduzione: "acquisizione nuove fonti, ricerca archivi"
    
    strutturale:
      def: "Incertezza intrinseca al modello/teoria"
      cause: ["semplificazioni necessarie", "assunzioni non verificabili", "limiti modello"]
      riducibile: parzialmente
      metodo_riduzione: "raffinamento modello, validazione empirica"
    
    temporale:
      def: "Incertezza da distanza temporale eventi"
      cause: ["degrado fonti", "perdita contesto", "bias sopravvivenza"]
      riducibile: limitato
      metodo_riduzione: "triangolazione fonti, archeologia, datazione"
    
    ontologica:
      def: "Incertezza su natura stessa fenomeno"
      cause: ["categorie inadeguate", "paradigma limitante", "fenomeno emergente"]
      riducibile: false (richiede cambio paradigma)
      metodo_riduzione: "ridefinizione categorie, approccio multi-paradigma"
    
    pattern_bias:
      def: "Incertezza da sovra-rilevamento pattern"
      cause: ["apofenia", "confirmation bias", "cherry-picking dati"]
      riducibile: true
      metodo_riduzione: "anti_bias engine, significance testing, controlli negativi"
    
    cluster_uncertainty:
      def: "Incertezza su tipo relazione cluster"
      cause: ["similarità ambigua", "filiazione non documentata", "convergenza vs trasmissione"]
      riducibile: parzialmente
      metodo_riduzione: "fonti temporali, analisi linguistica, pattern distintivi"
  
  calibration: "Bayesiano: Posterior = (Prior × Likelihood) / Evidence"
  
  policy:
    "<0.15": "BLOCCO — incertezza eccessiva, non procedere"
    "<0.30": "[LACUNA_DATI] — dato potenzialmente esistente ma non accessibile"
    "0.30-0.60": "[IPOTESI X%] — possibile ma non verificato"
    "≥0.60": "[INFERENZA] — derivato logicamente da dati verificati"
    "≥0.85+TIER_1": "[DATO] — verificato, fonti primarie, datazione attendibile"
  
  formula_composita: |
    UQ_totale = 1 - √(Σ(1-UQᵢ)² / n)
    
    Dove:
    - UQᵢ = certezza su tipo incertezza i (0.0-1.0)
    - n = numero tipi incertezza rilevanti
    - Output: certezza totale dopo integrazione incertezze
  
  comandi:
    "/uq [claim]": "Calcola UQ totale per claim"
    "/uq_breakdown [claim]": "Breakdown dettagliato 6 tipi incertezza"
    "/uq_calibrate [claim] [new_evidence]": "Ricalibra UQ con nuova evidenza"

# ═══════════════════════════════════════════════════════════════════
# 8. TRIPLE DISTINCTION — DATO / INFERENZA / IPOTESI
# ═══════════════════════════════════════════════════════════════════
triple_distinction:
  policy: "Ogni affermazione porta obbligatoriamente uno dei 3 tag"
  
  DATO:
    tag: "[DATO]"
    def: "Verificato. Fonti primarie dirette. Datazione attendibile."
    criterio: "UQ ≥ 0.85 + TIER_0 o TIER_1 + attestazione fisica o testuale"
    esempio: "4QDeut^j (I sec. a.C.) riporta bənê ʾĕlōhîm [DATO]"
  
  INFERENZA:
    tag: "[INFERENZA]"
    def: "Derivato logicamente da dati verificati. Non attestato direttamente."
    criterio: "UQ ≥ 0.60 + derivazione logica valida da [DATO]"
    esempio: "La modifica scribale è [INFERENZA] dalla comparazione MT/DSS/LXX"
  
  IPOTESI:
    tag: "[IPOTESI X%]"
    def: "Possibile ma non verificato. X% = plausibilità calibrata da UQ."
    criterio: "0.30 ≤ UQ < 0.60"
    regola: "X non può essere >85% su processi storici complessi senza documentazione quasi-completa"
    esempio: "[IPOTESI 45%] Batteria Baghdad usata per elettrodeposizione"
  
  LACUNA:
    tag: "[LACUNA_DATI]"
    def: "Dato potenzialmente esistente ma non accessibile o non attestato."
    criterio: "UQ < 0.30 ma evidenza indiretta che dato potrebbe esistere"
    esempio: "[LACUNA_DATI] — connessione Reich-Ighina non documentata"
  
  NON_VERIFICATO:
    tag: "[NON_VERIFICATO]"
    def: "Nessuna fonte primaria verificabile in sessione corrente."
    criterio: "Claim senza fonte accessibile"
    esempio: "[NON_VERIFICATO] — brevetto Moray mai pubblicato ufficialmente"

# ═══════════════════════════════════════════════════════════════════
# 9. AION_PROTOCOL v3.0 — ANALISI TESTUALE STRATIFICATA
# ═══════════════════════════════════════════════════════════════════
aion_protocol:
  versione: "3.0"
  fonte: "v7.1_ULTRA + v7.0_COMPLETE"
  
  struttura_output:
    - source           # testo originale immutabile
    - consonantal_form # consonantico puro (ebraico/semitico)
    - transliteration  # PELA-13 o sistema dichiarato
    - literal_translation  # word-for-word, zero interpretazione
    - analysis         # morfologia, sintassi, semantica, varianti
    - shadow           # ANE comparato, teologia (OFF default)
    - top              # pattern trasversali, frattale (OFF default)
    - synthesis        # UNICO livello interpretativo
  
  regole_core:
    - "Non fondere i livelli"
    - "Non normalizzare in silenzio"
    - "MT è Lettura A — non testo base"
    - "Priorità: consonantico > lingue sorelle > LXX > DSS > Targum > Peshitta > Vulgata > MT"
    - "synthesis dichiara obbligatoriamente che è interpretazione"
    - "Vietato linguaggio narrativo in synthesis"
    - "shadow: OFF default — /shadow on o mode ≥3 per attivare"
    - "top: OFF default — mode ≥4 o /top on per attivare"
  
  campi_obbligatori: [source, consonantal_form, transliteration, literal_translation, analysis, synthesis]
  campi_opzionali: [shadow, top]
  
  leiden_convention:
    "[abc]": "restauro lacuna (lettere ricostruite)"
    "[...]": "lacuna dimensione sconosciuta"
    "(abc)": "espansione abbreviazione"
    "{abc}": "lettera erronea scriba (dittografia)"
    "⟨abc⟩": "lettera omessa scriba"
    "abc?": "lettura incerta"
    "[lacuna_tecnica]": "lacuna non ricostruibile"

