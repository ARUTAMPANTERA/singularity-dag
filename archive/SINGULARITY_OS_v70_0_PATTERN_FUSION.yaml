      mitigation: "Ricerca attiva contro-evidenza, fonti contrastanti obbligatorie"
    
    apophenia:
      def: "Vedere pattern dove non esistono (sovra-rilevamento)"
      detection: "Pattern con p-value > 0.05, ricorrenza casuale"
      penalty: 0.40
      mitigation: "Significance testing, controlli negativi, shuffle test"
    
    availability_bias:
      def: "Sovrastimare importanza informazione facilmente disponibile"
      detection: "Over-reliance su fonti mainstream vs primarie"
      penalty: 0.20
      mitigation: "Priorità fonti primarie, ricerca archivi difficili"
    
    narrative_fallacy:
      def: "Costruire narrazione coerente ignorando complessità"
      detection: "Linearizzazione forzata, causalità inventata"
      penalty: 0.35
      mitigation: "Mantenere ambiguità, multi-path narrativi, [LACUNA_DATI]"
    
    survivorship_bias:
      def: "Ignorare dati/fonti perdute/distrutte"
      detection: "Conclusioni da corpus incompleto senza acknowledgment"
      penalty: 0.25
      mitigation: "Stima gap documentale, bias preservation"
  
  formula_penalty:
    pattern_score_adjusted = pattern_score_raw - (Σ bias_penalty_i)
    
    Se pattern_score_adjusted < 0.5 → pattern classificato [IPOTESI DEBOLE]
  
  enforcement: "Pre-filtraggio prima pattern mining e clustering"

# ═══════════════════════════════════════════════════════════════════
# 14. SIGNIFICANCE ENGINE v3.0
# ═══════════════════════════════════════════════════════════════════
significance_engine:
  versione: "3.0"
  fonte: "v7.1_ULTRA"
  stato: "ACTIVE_DEFAULT"
  
  formula: |
    Significance_Score = (Rarity × Coherence × Repetition) - Bias_Penalty
    
    Dove:
    - Rarity = 1 - (freq_corpus / freq_baseline)
    - Coherence = cosine_similarity(context_A, context_B)
    - Repetition = log₂(n_occurrences) / log₂(corpus_size)
    - Bias_Penalty = Σ(anti_bias penalties)
  
  range: "0.0-1.0"
  
  threshold_policy:
    "< 0.30": "NOISE — pattern casuale, non rilevante"
    "0.30-0.50": "[IPOTESI DEBOLE] — pattern possibile ma non robusto"
    "0.50-0.70": "[INFERENZA] — pattern rilevante, derivabile da dati"
    "0.70-0.85": "[DATO_PATTERN] — pattern forte, evidenza multipla"
    "> 0.85": "[DATO_ROBUSTO] — pattern eccezionale, altamente significativo"
  
  components_detail:
    rarity:
      calc: "1 - (freq_in_corpus / freq_in_baseline_language)"
      baseline: "Corpus generale lingua (es: BibleWorks per ebraico)"
      range: "0.0-1.0"
    
    coherence:
      calc: "cosine_similarity tra embedding contestuali"
      method: "TF-IDF o word2vec su contesto ±5 parole"
      range: "0.0-1.0"
    
    repetition:
      calc: "log₂(n_occ) / log₂(corpus_size)"
      normalization: "Log per evitare over-weight corpus grandi"
      range: "0.0-1.0"
  
  validation:
    p_value_target: "< 0.05"
    confidence_interval: "95%"
    multiple_testing_correction: "Bonferroni quando n_tests > 10"

