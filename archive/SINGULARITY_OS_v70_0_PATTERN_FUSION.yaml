# ═══════════════════════════════════════════════════════════════════
# 3. CLUSTER ENGINE v7.1 — RAGGRUPPAMENTO STRUTTURALE TESTI
# ═══════════════════════════════════════════════════════════════════
cluster_engine:
  versione: "7.1_ULTRA"
  fonte: "SINGULARITY_AION_v7.1_ULTRA"
  stato: "INTEGRATO_v70.0"
  
  obiettivo: "Raggruppare testi per struttura narrativa e pattern — non per nome o tradizione"
  
  metodo:
    step_1: "Estrarre pattern da ogni testo (usando Pattern Miner)"
    step_2: "Normalizzare pattern su scala comune (0.0-1.0)"
    step_3: "Calcolare similarità strutturale tra testi (cosine similarity)"
    step_4: "Clusterizzare per soglia significance > 0.5"
    step_5: "Determinare tipo di relazione per ogni cluster"
  
  output_cluster:
    cluster_id: "identificatore univoco cluster"
    testi: "lista testi nel cluster"
    pattern_condivisi: "pattern che accomunano i testi"
    score_medio: "significance score medio del cluster"
    tipo_relazione: "categoria relazione (identico/derivato/trasformato/indipendente)"
  
  tipo_relazione:
    identico:
      def: "Struttura e contenuto coincidono — stessa fonte o copia diretta"
      soglia: "similarity > 0.90"
      evidenza: "≥80% pattern identici + sequenza narrativa identica"
    
    derivato:
      def: "Uno dipende dall'altro — trasformazione consapevole"
      soglia: "similarity > 0.70 && temporal_order documentato"
      evidenza: "pattern core identici + variazioni controllate + filiazione documentata"
    
    trasformato:
      def: "Adattamento culturale con variazioni significative"
      soglia: "similarity 0.50-0.70"
      evidenza: "pattern strutturali comuni + contenuti divergenti + contesto culturale diverso"
    
    indipendente:
      def: "Convergenza parallela senza contatto documentato"
      soglia: "similarity 0.50-0.65 && no_temporal_connection"
      evidenza: "pattern simili + nessuna evidenza di trasmissione + separazione geografica/temporale"
  
  lock_associate:
    CLUSTER_L1: "Attivazione automatica su n_testi ≥3"
    CLUSTER_L2: "Tipo relazione obbligatorio per ogni cluster"
    CLUSTER_L3: "Significance score < 0.5 → cluster non citato come evidenza"
  
  comandi:
    "/cluster [t1] [t2] [t3]...": "Esegui clustering su lista testi"
    "/cluster_auto": "Clustering automatico su tutti i testi citati nella sessione"
    "/cluster_show [cluster_id]": "Mostra dettagli cluster specifico"

# ═══════════════════════════════════════════════════════════════════
# 4. PATTERN MINER v7.1 — DETECTION 7 TIPI PATTERN
# ═══════════════════════════════════════════════════════════════════
pattern_miner:
  versione: "7.1_ULTRA"
  fonte: "SINGULARITY_AION_v7.1_ULTRA"
  stato: "INTEGRATO_v70.0"
  tipi_pattern: 7
  
  pattern_types:
    
    frequency_anomaly:
      nome: "Anomalia di Frequenza"
      def: "Ricorrenza statisticamente anomala nel corpus"
      detection: "elemento appare con frequenza > (media + 2σ) nel corpus"
      esempio: "termine tecnico ricorre 15 volte in corpus di 1000 parole (media: 2±1)"
      output: {tipo: "frequency_anomaly", score, occorrenze, baseline, sigma_deviation}
    
    sequence:
      nome: "Sequenza Narrativa Ricorrente"
      def: "Ordine narrativo ricorrente tra testi indipendenti"
      detection: "sequenza A→B→C appare in ≥2 testi senza filiazione diretta"
      esempio: "discesa → prova → ascesa in miti di culture separate"
      output: {tipo: "sequence", score, sequence_order, testi_attestanti, compatibilita_temporale}
    
    symmetry:
      nome: "Strutture Speculari"
      def: "Strutture speculari interne al testo (chiasmi, paralleli)"
      detection: "pattern A-B-C-B'-A' o varianti simmetriche"
      esempio: "chiasmo Gen 1:1-2:3 (creazione→pienezza→riposo→pienezza→creazione)"
      output: {tipo: "symmetry", score, struttura, simmetria_tipo}
    
    inversion:
      nome: "Inversione Narrativa"
      def: "Rovesciamento di struttura narrativa (A→B diventa B→A)"
      detection: "stessa sequenza in ordine inverso in testi diversi"
      esempio: "caduta→redenzione vs redenzione→caduta"
      output: {tipo: "inversion", score, sequenza_base, sequenza_inversa, testi}
    
    co_occurrence:
      nome: "Co-occorrenza Sistematica"
      def: "Elementi che appaiono sempre insieme (≥3 fonti)"
      detection: "elementi X e Y presenti insieme in ≥3 testi indipendenti"
      esempio: "fuoco + voce + nube in teofanie (Esodo, 1Re, Isaia)"
      output: {tipo: "co_occurrence", score, elementi, fonti, probabilita_casuale}
    
    structural_break:
      nome: "Frattura Strutturale"
      def: "Punto in cui il testo cambia registro o stile"
      detection: "cambio vocabolario/sintassi/tono rilevabile statisticamente"
      esempio: "Gen 1 vs Gen 2 (elohim→YHWH, cosmico→terrestre, imperativo→narrativo)"
      output: {tipo: "structural_break", score, posizione_break, parametri_cambio}
    
    narrative_cycles:
      nome: "Cicli Narrativi"
      def: "Schemi ricorrenti (discesa/ritorno, caos/ordine, morte/rinascita)"
      detection: "pattern ciclico documentato in ≥2 culture/tradizioni"
      esempio: "discesa_inferi → prova → ritorno_trasformato (Inanna, Orfeo, Cristo)"
      output: {tipo: "narrative_cycles", score, ciclo_tipo, fasi, attestazioni_culturali}
  
  trigger: "Ricorrenza non-casuale (almeno 2 fonti indipendenti)"
  
  output_per_pattern:
    tipo: "uno dei 7 tipi"
    score: "da significance_engine (0.0-1.0)"
    fonti_indipendenti: "lista fonti che attestano il pattern"
    compatibilita_temporale: "verificata/possibile/improbabile"
    tag: "[DATO] / [INFERENZA] / [IPOTESI X%]"
    evidenza_statistica: "p-value se applicabile"
  
  lock_associate:
    PATTERN_L1: "Scan automatico 7 tipi su corpus ≥2 testi"
    PATTERN_L2: "≥2 fonti indipendenti obbligatorie per trigger"
    PATTERN_L3: "Significance score = (rarity × coherence × repetition) - bias_penalty"
    PATTERN_L4: "Score < 0.5 → [IPOTESI DEBOLE], non citabile come evidenza"
  
  comandi:
    "/pattern_scan [corpus]": "Scan completo 7 tipi su corpus specificato"
    "/pattern [tipo] [corpus]": "Scan specifico su un tipo di pattern"
    "/significance [pattern_id]": "Calcola significance score per pattern"
    "/atlante [fenomeno]": "Pattern cross-culturale con n_culture ≥3"

