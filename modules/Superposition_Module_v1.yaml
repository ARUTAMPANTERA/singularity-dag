# ─── INTEGRAZIONE CON ALTRI MODULI ────────────────────────────────────────────
integrations:
  uq_v6: "Calcola UQ per ciascun claim all'apertura e ad ogni aggiornamento evidenza"
  majorana_theta_v4: "Calcola θ tra vettori semantici dei claim"
  si_calibration_v4: "Verifica che alto SI non stia artificialmente aumentando θ"
  factoid_schema_v6: "Aggiorna campo 57 (superposition_state) in entrambi i factoid"
  governance_council_v2: "Notifica Guardian per stati STALE o collasso ambiguo"
  dag: "Logga ogni cambio di stato come artifact immutabile"
