name: Validate DAG artifacts
on:
  push:
    paths:
      - 'artifacts/**.json'
jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      - name: Run validation for changed artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for f in artifacts/*.json; do
            echo "Validating $f"
            python3 scripts/validate_artifact.py "$f" --output "${f%.*}_VALIDATION_REPORT.json"
            git add "${f%.*}_VALIDATION_REPORT.json" || true
          done
          if git diff --staged --quiet; then
            echo "No report changes to commit"
          else
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Auto: validation reports for artifacts @${{ github.sha }}"
            git push
          fi
