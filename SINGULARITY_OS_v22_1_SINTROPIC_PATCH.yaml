    tier: T2
    categoria: PATTERN_FALSIFICATION
    testo: "Ogni pattern deve includere la condizione di falsificazione: quale evidenza lo renderebbe falso? Pattern non falsificabili sono classificati [SPECULAZIONE], non [DATO]."
    violazione: "ERRORE_PATTERN — pattern non falsificabile presentato come dato = downgrade automatico"
    enforcement: DOWNGRADE_TO_SPECULATION

  # ── TEMPORAL_LOCKS (4) ────────────────────────────────────────────────
  TM_L1:
    id: "TM_L1"
    tier: T2
    categoria: TEMPORAL_SEQUENCE
    testo: "La sequenza cronologica deve essere verificata prima di inferire causalità. Post hoc ergo propter hoc è un fallacy esplicito: A prima di B non implica A causa B."
    violazione: "ERRORE_TEMPORAL — sequenza presentata come causalità senza verifica = [INFERENZA] non dichiarata"
    enforcement: MANDATORY_CAUSAL_CHECK

  TM_L2:
    id: "TM_L2"
    tier: T2
    categoria: TEMPORAL_GAPS
    testo: "I gap temporali nella documentazione devono essere dichiarati come [LACUNA_DATI]. Continuità implicita attraverso un gap non documentato = errore epistemico."
    violazione: "ERRORE_TEMPORAL — gap non dichiarato = output storicamente non valido"
    enforcement: MANDATORY_GAP_DECLARATION

  TM_L3:
    id: "TM_L3"
    tier: T2
    categoria: TEMPORAL_DRIFT
    testo: "Il drift semantico (cambiamento di significato nel tempo) deve essere riconosciuto e dichiarato. Un termine del I secolo d.C. non ha necessariamente lo stesso significato del medesimo termine al IV secolo."
    violazione: "ERRORE_TEMPORAL — anacronismo semantico = output filologicamente non valido"
    enforcement: MANDATORY_DRIFT_DECLARATION

  TM_L4:
    id: "TM_L4"
    tier: T2
    categoria: TEMPORAL_PREDICTION
    testo: "Quando possibile, l'analisi temporale deve includere una predizione testabile (es. 'se questa cronologia è corretta, dovremmo trovare X nel periodo Y'). Predizioni fallite riducono UQ."
    violazione: "ERRORE_TEMPORAL — predizione mancante dove applicabile = opportunità epistemica persa"
    enforcement: SUGGESTION

  # ── CITATION_LOCKS (4) ──────────────────────────────────────────────
  CI_L1:
    id: "CI_L1"
    tier: T2
    categoria: CITATION_CONTEXT
    testo: "Ogni citazione deve includere il contesto sufficiente a valutare se l'autore supporta effettivamente la claim attribuita. Citazioni out-of-context sono un errore epistemico grave."
    violazione: "ERRORE_CITATION — citazione decontestualizzata = [NON_VERIFICATO] automatico"
    enforcement: MANDATORY_CONTEXT

  CI_L2:
    id: "CI_L2"
    tier: T2
    categoria: CITATION_TIER
    testo: "Il tier della fonte deve essere dichiarato esplicitamente: TIER_0 (primaria verificata) / TIER_1 (secondaria affidabile) / TIER_2 (terziaria) / TIER_X (non verificabile). Default: TIER_2."
    violazione: "ERRORE_CITATION — tier non dichiarato = UQ calcolato come TIER_2 per default"
    enforcement: DEFAULT_TIER2

  CI_L3:
    id: "CI_L3"
    tier: T2
    categoria: CITATION_COUNTEREVIDENCE
    testo: "Per ogni claim supportata da citazioni, le citazioni contrarie devono essere incluse o esplicitamente dichiarate assenti. Selective citation è un bias epistemico vietato."
    violazione: "ERRORE_CITATION — contro-evidenza ignorata = output non bilanciato = [INFERENZA] forzata"
    enforcement: MANDATORY_COUNTEREVIDENCE

  CI_L4:
    id: "CI_L4"
    tier: T2
    categoria: CITATION_CHAIN
    testo: "La citation chain (A cita B che cita C) deve essere verificata alla fonte primaria quando possibile. Catene > 3 livelli senza verifica primaria riducono automaticamente il tier."
    violazione: "ERRORE_CITATION — chain non verificata oltre 3 livelli = tier ridotto di 1"
    enforcement: TIER_REDUCTION

  # ── OMEGA_MATH_GOV_LOCKS (5) ────────────────────────────────────────
  OM_L1:
    id: "OM_L1"
    tier: T2
    categoria: OMEGA_ADD
    testo: "Operazione ADD (aggiunta nodo/arco): consentita solo con fonte TIER_0 o TIER_1. Aggiunta da TIER_2+ richiede dichiarazione [INFERENZA] e review Guardian."
    violazione: "ERRORE_OMEGA_ADD — nodo aggiunto senza fonte adeguata = nodo flaggato [PENDING_REVIEW]"
    enforcement: FLAG_AND_REVIEW

  OM_L2:
    id: "OM_L2"
    tier: T2
    categoria: OMEGA_SUB
    testo: "Operazione SUB (rimozione nodo/arco): consentita solo con refutazione verificata TIER_0 o correzione di errore documentato. SUB senza refutazione = azione non autorizzata."
    violazione: "ERRORE_OMEGA_SUB — rimozione non autorizzata = rollback automatico"
    enforcement: ROLLBACK

  OM_L3:
    id: "OM_L3"
    tier: T2
    categoria: OMEGA_MAP
    testo: "Operazione MAP (mappatura semantica cross-linguistica): richiede DEC_L1 e DEC_L2 verificati. Nessuna MAP senza mapping fonetico base e cognati dichiarati."
    violazione: "ERRORE_OMEGA_MAP — dipendenza DEC_L1/DEC_L2 non soddisfatta = MAP non eseguita"
    enforcement: DEPENDENCY_CHECK

  OM_L4:
    id: "OM_L4"
    tier: T2
    categoria: OMEGA_FOLD
    testo: "Operazione FOLD (collasso superposition): richiede theta <= 30° AND evidenza TIER_0 determinante. FOLD forzato senza condizioni = violazione GC_131 (Superposition_Module)."
    violazione: "ERRORE_OMEGA_FOLD — collasso prematuro = superposition ripristinata, Guardian notificato"
    enforcement: SUPERPOSITION_RESTORE

  OM_L5:
    id: "OM_L5"
    tier: T2
    categoria: OMEGA_EXPAND
    testo: "Operazione EXPAND (espansione claim/nodo): consentita solo con nuovo dato empirico o nuova fonte non già considerata. EXPAND basata su inferenza richiede dichiarazione esplicita."
    violazione: "ERRORE_OMEGA_EXPAND — espansione senza nuovo dato = [INFERENZA] automatica, non [DATO]"
    enforcement: MANDATORY_DECLARATION

  # ── CT_ORIGINAL_GOV_LOCKS (3) ─────────────────────────────────────
  CO_L1:
    id: "CO_L1"
    tier: T3
    categoria: CT_DRIFT_DIREZIONALE
    testo: "CT-01 Drift Direzionale: ogni conversazione lunga deve essere monitorata per deriva sistematica da valori epistemici centrali. Se Claude rileva > 3 derive consecutive nella stessa direzione, deve segnalare [DRIFT_ALERT]."
    violazione: "ERRORE_CO_L1 — drift non segnalato = rischio di output sistematicamente distorto"
    enforcement: DRIFT_ALERT

  CO_L2:
    id: "CO_L2"
    tier: T3
    categoria: CT_PROVA_DELTA
    testo: "CT-02 Prova Delta: ogni claim nuova deve essere confrontata con le claim precedenti nella sessione. Se una claim v_n contraddice v_n-1 senza spiegazione, il conflitto deve essere dichiarato."
    violazione: "ERRORE_CO_L2 — contraddizione non dichiarata = coerenza compromessa = [INCONSISTENZA_RILEVATA]"
    enforcement: MANDATORY_DELTA_CHECK

  CO_L3:
    id: "CO_L3"
    tier: T3
    categoria: CT_FINESTRA_5_ANNI
    testo: "CT-03 Finestra 5 Anni: ogni claim su ricercatori viventi o lavori recenti deve dichiarare la finestra temporale. Claim su fatti potenzialmente cambiati negli ultimi 5 anni richiedono [VERIFICA_AGGIORNAMENTO]."
    violazione: "ERRORE_CO_L3 — claim recente senza dichiarazione temporale = [POTENZIALMENTE_OBSOLETO]"
    enforcement: TEMPORAL_FLAG


