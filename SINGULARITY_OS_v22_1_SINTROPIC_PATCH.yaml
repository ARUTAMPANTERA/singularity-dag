# ═══════════════════════════════════════════════════════════════════════════
# SINTROPIC_ENGINE_v1 — ENGINE #21 [NUOVO in v22.0]
# Operazionalizza la sintropia di Fantappiè in metrica computabile
# Contributo Manus AI — validazione Claude Temù CT-01
# ═══════════════════════════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════════════════════════
# SINTROPIC_ENGINE_v2 — ENGINE #21 — VERSIONE INTEGRALE
# Upgrade da v1 (Sy singolo) → v2 (Sy_op / Sy_phys / Sy_global separati)
# Fonte teorica: Fantappiè (1944) + Shannon entropia informativa
# Documento tecnico: sintropic_engine_v2 / 2.0-integrale
# Correzioni CT-01: YAML valido, namespace, versioni, SY_L15 invariato
# ═══════════════════════════════════════════════════════════════════════════
sintropic_engine_v2:
  id: 21
  nome: "Sintropic_Engine_v2"
  versione: "2.0-integrale"
  namespace: "/sys/sintropic/"
  mount: "/sys/sintropia"
  data_integrazione: "2026-06-13"
  status: "stable"
  predecessor: "sintropic_engine_v1 (formula unica Sy=Σ(ΔO)/Σ(ΔE) — sostituita)"

  hooks:
    AION_sigma3:  "AION_LANG v8.2 — analisi letterale (Σ3)"
    AION_sigma7:  "AION_LANG v8.2 — analisi tecnica (Σ7)"
    CT_06:        "MAJI CT-06 — coerenza architettonica — fornisce theta_arch"
    CT_08:        "CT-08 — testimoni prossimali/distali — fornisce IT_score proxy"
    PRISM_multi:  "PRISM 9D — domini fisici D1-D9 — filtro multi-dominio"
    majorana:     "/sys/majorana — majorana_engine_v3 — interferenza e theta_global"

  compatibilita:
    AION:  "v8.2 (corrente nel sistema)"
    CT:    "CT-01 through CT-08 (corrente nel sistema)"
    PRISM: "9D matrix v3.0 (corrente nel sistema)"
    nota:  "Versioni sistema reali — il doc esterno citava versioni incompatibili"

  # ─────────────────────────────────────────────────────────────────────────
  # INDICE 1 — Sy_op (Sintropia Operativa)
  # Uso: pipeline operative, ranking, tuning, decisioni SY_L
  # ─────────────────────────────────────────────────────────────────────────
  Sy_op:
    descrizione: "Indice di Sintropia Operativa — misura qualita, coerenza, trasmissione"
    uso: "Pipeline operative, ranking nodi, trigger SY_L, tuning parametri"
    formula: "Sy_op = (wO * O) + (wC * C) + (wT * T)"

    componenti:
      O:
        nome: "Ordine Informativo"
        formula: "O = D_nuovi / D_totali"
        D_nuovi:  "Campi NODE_SCHEMA compilati nella sessione (da LACUNA a DATO/INFERENZA)"
        D_totali: "Campi totali NODE_SCHEMA — 38 per T2, variabile per T1/T3"
        on_error_zero: "se D_totali == 0 → O = 0"
        range: "[0.0, 1.0]"

      C:
        nome: "Coerenza Architettonica"
        formula: "C = clamp(1 - (theta_arch / 180), 0, 1)"
        theta_arch: "da CT-06/MAJI — distanza angolare tra fonti [gradi]"
        casi:
          theta_0:   "C = 1.00 (fonti perfettamente allineate)"
          theta_90:  "C = 0.50 (fonti ortogonali)"
          theta_180: "C = 0.00 (fonti in conflitto totale)"
        fonte: "/sys/majorana — majorana_engine_v3.compute_theta()"

      T:
        nome: "Trasmissione Storica (proxy IT_score)"
        formula: "T = clamp(IT_score, 0, 1)"
        nota_proxy: "[INFERENZA] IT_score misura rilevanza italiana, usato come proxy di trasmissione storica verificata. Approssimazione dichiarata — non sostituire con dato diretto senza schema aggiornato."
        it_score_source: "campo it_score di NODE_SCHEMA_v2.1_CT"
        range: "[0.0, 1.0]"

    pesi_default:
      wO: 0.4
      wC: 0.4
      wT: 0.2
      nota: "Somma pesi = 1.0. Modificabili via /sy_weights [wO] [wC] [wT]."

    merge_policy:
      priorita: "Sy_op > Sy_phys in caso di conflitto"
      conflict_resolution: "majorana_engine_v3.interfere() in /sys/majorana"
      nota: "Sy_op e piu stabile perche usa dati direttamente misurabili"

  # ─────────────────────────────────────────────────────────────────────────
  # INDICE 2 — Sy_phys (Sintropia Fisica)
  # Uso: valutazione epistemica, stabilita grafo, purificazione nodo
  # ─────────────────────────────────────────────────────────────────────────
  Sy_phys:
    descrizione: "Indice di Sintropia Fisica — riduzione entropia Shannon nel grafo"
    uso: "Valutazioni epistemiche, stabilita nodo, purificazione sessione"
    formula: "Sy_phys = 1 - (H_post / H_prior)"
    fonte_teorica: "Shannon H = -(sum p_i * log2(p_i)) | Prigogine strutture dissipative"

    componenti:
      H_prior:
        descrizione: "Entropia del nodo prima della sessione di analisi"
        calcolo_operativo: "H_prior = lacune_iniziali / campi_totali"
        lacune_iniziali: "campi NODE_SCHEMA con valore [LACUNA_DATI] all'inizio sessione"
        campi_totali: "38 per T2, variabile per altri tier"

      H_post:
        descrizione: "Entropia del nodo dopo la compilazione/analisi"
        calcolo_operativo: "H_post = lacune_residue / campi_totali"
        lacune_residue: "campi NODE_SCHEMA ancora [LACUNA_DATI] dopo la sessione"

    esempio_computazione:
      scenario: "Nodo T2 con 20 lacune iniziali → 5 lacune residue"
      H_prior: "20/38 = 0.526"
      H_post:  "5/38 = 0.132"
      Sy_phys: "1 - (0.132/0.526) = 1 - 0.25 = 0.75 [SINTROPIA_ALTA]"

    vincoli:
      - "H_prior > 0 (sempre verificato se nodo ha almeno 1 lacuna iniziale)"
      - "Sy_phys range teorico: (-∞, 1] — in pratica [0, 1] con H gestito correttamente"
    on_error:
      - "se H_prior == 0 → Sy_phys = 1.0 (nodo senza lacune = massima sintropia fisica)"
      - "se H_post > H_prior → Sy_phys negativo → segnala [ENTROPIA_AUMENTATA] → clamp a 0"
      - "se errore calcolo → Sy_phys = 0 + log [FLAG_ENTROPY_CORRUPTED]"

  # ─────────────────────────────────────────────────────────────────────────
  # INDICE 3 — Sy_global (Sintropia Composita)
  # Uso: SOLO sintesi e ranking di alto livello — NON per tuning
  # ─────────────────────────────────────────────────────────────────────────
  Sy_global:
    descrizione: "Sintropia composita — sintesi degli indici operativo e fisico"
    formula: "Sy_global = mean(Sy_op, Sy_phys)"
    attenzione: "NON usare Sy_global per tuning o decisioni operative. Usare Sy_op."
    uso_corretto:
      - "Ranking nodi per priorità sistemica"
      - "Report di sessione /sy_global"
      - "Soglia SY_L3 (Sy_global < 0.20 = degenerazione)"
      - "Attrattore sistemico SY_L20 (Sy_global → 1.0 = Punto Omega)"

  # ─────────────────────────────────────────────────────────────────────────
  # THRESHOLDS (usano Sy_op per decisioni operative, Sy_global per sintesi)
  # ─────────────────────────────────────────────────────────────────────────
  thresholds:
    SINTROPIA_ALTA:
      sy_op_min: 0.70
      label: "[SINTROPIA_ALTA]"
      colore: GREEN
      azione: "Nodo prioritario per SY_L2. Attrattore formulabile."
    EQUILIBRIO_EPISTEMICO:
      sy_op_min: 0.30
      label: "[EQUILIBRIO_EPISTEMICO]"
      colore: AMBER
      azione: "Analisi standard. Source_Linker in standby."
