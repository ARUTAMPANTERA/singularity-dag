majorana_engine_v3:
  filosofia: "Per ogni claim C, cercare attivamente anti-claim A. theta misura l'interferenza."
  formula_theta: |
    V_pro  = [e1, e2, ..., en]   (pesi evidenza pro-claim)
    V_anti = [a1, a2, ..., am]   (pesi evidenza anti-claim)
    cos(theta) = (V_pro · V_anti) / (|V_pro| × |V_anti|)
    theta = arccos(cos_similarity) × (180/pi)
  interpretazione:
    "0-30 gradi":    "[INTERFERENZA_COSTRUTTIVA] — UQ × 1.05"
    "30-70 gradi":   "[DATO_PURIFICATO] — bias parziale rimosso, UQ × 0.95"
    "70-110 gradi":  "[STATO_INTERMEDIO] — CONVERGENCE_PROTOCOL attivato"
    "110-150 gradi": "[CONFLITTO_EPISTEMICO] — UQ × 0.80"
    "150-180 gradi": "[VOID_NEUTRAL] — annichilimento totale, UQ -> 0.00"
  trigger: "Automatico per Nd > 6.0 O /majorana esplicito"
  heartbeat_boot:
    particella: "brʾ (ב-ר-א) — configurare/tagliare/separare"
    antiparticella: "ḥrb (ח-ר-ב) — devastare/distruggere/vuotare"
