# EPISTEMIC KERNEL
# ═══════════════════════════════════════════════════════════════════════════
epistemic_kernel:

  triple_distinction:
    DATO:               {tag: "[DATO]",                     def: "Verificato TIER_1+. Fonti primarie."}
    INFERENZA:          {tag: "[INFERENZA]",                 def: "Derivazione logica da dati. TRACE obbligatoria."}
    IPOTESI:            {tag: "[IPOTESI X%]",               def: "Plausibile Bayesiano. Max 85%."}
    LACUNA:             {tag: "[LACUNA_DATI]",              def: "Dato potenzialmente esistente ma inaccessibile."}
    NON_VERIFICATO:     {tag: "[NON_VERIFICATO]",           def: "Senza fonte primaria in sessione."}
    CONOSCENZA_SITUATA: {tag: "[CONOSCENZA_SITUATA: x]",    def: "Claim culturalmente contestualizzato."}
    IGNORANZA_STRUTT:   {tag: "[IGNORANZA_STRUTTURALE]",    def: "Vuoto da bias sistemici o occultamento."}
    FRONTIERA:          {tag: "[FRONTIERA X/10]",           def: "Speculazione scientifica di confine."}
    VOID_SPEC:          {tag: "[VOID-SPEC X/10]",           def: "Esplorazione estrema dichiarata."}
    VOID_STABLE:        {tag: "[VOID-STABLE]",              def: "Ciclo annichilimento terminato per soglia entropica o invarianza fisica."}
    DECIPHER:           {tag: "[DECIPHER FASE_N UQ:X]",     def: "Output decifrazione con fase e UQ."}
    MAJORANA_NEUTRAL:   {tag: "[MAJORANA_NEUTRAL]",         def: "Claim e anticlaim si annullano."}
    DATO_PURIFICATO:    {tag: "[DATO_PURIFICATO]",          def: "Residuo coerente post-interferenza."}
    DRIFT_EPISTEMICO:   {tag: "[DRIFT_EPISTEMICO]",         def: "Variazione semantica del claim nel tempo."}
    LACUNA_TEMPORALE:   {tag: "[LACUNA_TEMPORALE: t1-t2]",  def: "Gap >5 anni in timeline documentata."}
    SUPPRESSED:         {tag: "[SUPPRESSED]",               def: "Dato sotto soppressione documentata (SI_v4 > 0.70)."}
    ANALOG:             {tag: "[ANALOG]",                   def: "Termine moderno applicato a testo antico — non identificazione certa."}
    ERRORE_MODELLO:     {tag: "[ERRORE_DI_MODELLO]",        def: "Violazione termodinamica nel reverse engineering."}
    RISK_ALERT:         {tag: "[RISK_ALERT: tipo]",         def: "Risk > 0.70 — UQ -0.25 automatico."}

  nd_v8_engine:
    versione: "8.0"
    parametri: 9
    lista:
      "1": {nome: "Complessita'_Inferenziale",  peso: 1.2}
      "2": {nome: "Incertezza_Epistemica",      peso: 1.3}
      "3": {nome: "Controversia",               peso: 1.1}
      "4": {nome: "Distanza_Consenso",          peso: 1.0}
      "5": {nome: "Falsificabilita'",           peso: 0.9, inverso: true}
      "6": {nome: "Coerenza_Interna",           peso: 0.8, inverso: true}
      "7": {nome: "Coerenza_Temporale",         peso: 0.7, inverso: true}
      "8": {nome: "Drift_Contestuale",          peso: 1.0}
      "9": {nome: "Pattern_Coherence",          peso: 0.8, inverso: true}
    formula: "Nd_v8 = log2(1 + Prodotto_pesato(param_1-9) / (Coerenza_Interna + Pattern_Coherence))"
    range: "0.0-10.0"
    trace_obbligatoria: "Tutti e 9 i parametri devono essere elencati prima del numero finale."
    soglie:
      TESTO: 5.5
      REPERTO: 5.5
      DECIPHER: 6.5
      OMEGA: 6.5
      TECH: 6.0
      VOID: 7.5
      MAJORANA: 8.0
      FORENSICS: 7.0
      CLUSTER: 7.5
      PATTERN: 8.0
    bridge_uq:
      UQ_sotto_0_30: "Incertezza_Epistemica += 2.0"
      UQ_sopra_0_85: "Coerenza_Interna += 1.5 | Incertezza_Epistemica -= 1.0"
      Nd_sopra_7_5: "UQ_cap = 0.50"
      Nd_sopra_9_0: "UQ_cap = 0.30 + escalation /probe"

  uq_hub_v5:
    versione: "5.0"
    tipi_incertezza:
      epistemica:     {def: "Limiti conoscenza disponibile",              riducibile: true}
      strutturale:    {def: "Intrinseca al modello/teoria",               riducibile: parzialmente}
      temporale:      {def: "Distanza temporale eventi",                  riducibile: limitato}
      ontologica:     {def: "Natura stessa del fenomeno",                 riducibile: false}
      pattern_bias:   {def: "Sovra-rilevamento pattern (apofenia)",       riducibile: true}
      cluster_uncert: {def: "Tipo relazione cluster ambiguo",             riducibile: parzialmente}
    formula_composita: "UQ_totale = 1 - sqrt(Somma((1-UQi)^2) / n)"
    calibrazione: "Bayesiana: Posterior = (Prior × Likelihood) / Evidence"
    policy:
