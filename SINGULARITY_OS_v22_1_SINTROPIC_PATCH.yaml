factoid_schema_v6:
  version: "6.0"
  total_fields: 57
  fields:
    # ─── CORE IDENTIFICATION ───
    - {id: 1, name: "factoid_id", type: "string(UUID)", required: true, example: "FCT000001"}
    - {id: 2, name: "label", type: "string", required: true, example: "Invenzione Radio"}
