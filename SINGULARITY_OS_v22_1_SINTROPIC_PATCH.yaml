    testo: "I lock SY_L1-SY_L20 sono SUBSIDIARI all'ALTARE (GC_001-GC_150) e a tutti i lock del sistema. In caso di conflitto, l'ALTARE prevale sempre. SY_L estendono, non sostituiscono."
