# ═════════════════════════════════════════════════════════════════════════════
# 2. ENGINES — 20 MOTORI COMPLETI (16 EREDITATI + 4 SUPERNOVA)
# ═════════════════════════════════════════════════════════════════════════════

  # ─── ENGINES v3.0 — 20 MOTORI CON FORMULE COMPLETE ─────────────────────────

engines:
  # ─── MOTORI EREDITATI (1-16) ───
  nd_v9:
    id: 1
    name: "Text Complexity & Density"
    input: "Testo T, lunghezza L, distribuzione concetti C"
    output: "Nd ∈ [0, 14]"
    formula_esplicita: |
      STEP 1: Segmenta T in unità semantiche (frasi/paragrafi)
      STEP 2: Estrai concetti unici C e relazioni R
      STEP 3: Calcola entropia H(T) = -Σ p(c) log₂ p(c)
      STEP 4: Calcola compressibilità K(T) = L_compresso / L_originale
      STEP 5: Nd_raw = log₂(1 + (H(T) × |C| × |R|) / K(T))
      STEP 6: Nd = clamp(round(Nd_raw), 0, 14)
    interpretazione:
      "0-3": "BANALE — testo semplice, ridondante"
      "4-7": "STANDARD — complessità normale"
      "8-10": "DENSO — stratificato, non banale"
      "11-14": "ESTREMO — massima densità concettuale"

  uq_v6:
    id: 2
    name: "Uncertainty Quantification"
    input: "Claim c, fonti S, TIER, conflitti, bias_penalty"
    output: "UQ ∈ [0.0, 1.0] (CAP 0.92)"
    formula_esplicita: |
      STEP 1: Assegna peso w_tier (TIER_0=1.0, TIER_1=0.8, TIER_2=0.5, TIER_3=0.2)
      STEP 2: S_support = Σ w_tier / max_support
      STEP 3: conflict_penalty = n_conflitti / (n_fonti + n_conflitti)
      STEP 4: bias_penalty = omogeneità_fonti × 0.3
      STEP 5: UQ_raw = S_support × (1 - conflict_penalty) × (1 - bias_penalty)
      STEP 6: UQ = min(UQ_raw, 0.92)
    interpretazione:
      "<0.15": "BLOCCO"
      "0.15-0.29": "[LACUNA_DATI]"
      "0.30-0.59": "[IPOTESI X%]"
      "0.60-0.84": "[INFERENZA]"
      "≥0.85": "[DATO]"

  majorana_theta_v4:
    id: 3
    name: "Version Divergence Angle"
    input: "Due versioni A, B (vettori feature)"
    output: "θ ∈ [0°, 180°]"
    formula_esplicita: |
      STEP 1: Vettorizza feature epistemiche A e B
      STEP 2: cos_sim = (A · B) / (|A| × |B|)
      STEP 3: θ = arccos(cos_sim) × 180/π
    interpretazione:
      "≤30°": "[INTERFERENZA_COSTRUTTIVA]"
      "31°-60°": "[STATO_INTERMEDIO]"
      ">60°": "Divergenza forte"

  agnotology_si_v3:
    id: 4
    name: "Suppression Index"
    input: "Cluster factoid, pattern omissione"
    output: "SI ∈ [0.0, 1.0]"
    formula_esplicita: |
      STEP 1: IR = Institutional_Resistance (0.0-1.0)
      STEP 2: FD = Funding_Denial (0.0-1.0)
      STEP 3: RS = Replicability_Score (0.1-1.0)
      STEP 4: SI_raw = (IR × FD) / RS
      STEP 5: SI = clamp(SI_raw, 0.0, 1.0)
    interpretazione:
      "≥0.6": "Pattern sospetto di soppressione"

  prism_domain_v2:
    id: 5
    name: "PRISM Domain Isolation"
    input: "Claim c"
    output: "Dominio D1-D9"
    formula_esplicita: |
      STEP 1: Analizza vocabolario e ontologia claim
      STEP 2: Mappa su D1(Classica) ... D9(Void)
      STEP 3: Se ≥2 domini → Convergence Protocol (Vettore Primario)

  aion_stratifier_v3:
    id: 6
    name: "AION Stratification Σ0-Σ14"
    input: "Testo antico T, time_span"
    output: "15 strati analitici"
    formula_esplicita: |
      STEP 1: Σ0 = Source (Immutabile)
      STEP 2: Σ1 = Consonantal (Puro)
      ...
      STEP 15: Σ14 = Synthesis (Interpretazione)

  langdon_protocol_v2:
    id: 7
    name: "Fiction↔Reality Mapping"
    input: "Opera fiction F"
    output: "Mappatura su DB reale"
    formula_esplicita: |
      STEP 1: Extract tech claims da F
      STEP 2: Map su FactoidDB
      STEP 3: Pattern match con storia reale
      STEP 4: Failure condition

  consensus_orchestrator_v2:
    id: 8
    name: "Multi-LLM Consensus"
    input: "Claim c, Modelli M1..Mn"
    output: "Consensus Score ∈ [0.0, 1.0]"
    formula_esplicita: |
      STEP 1: Query M1..Mn indipendentemente
      STEP 2: Estrai semantic embeddings E1..En
      STEP 3: Calcola pairwise cosine similarity
      STEP 4: Score = media(similarities)

  citation_tracker_v2:
    id: 9
    name: "Citation Link Validation"
    input: "URI u"
    output: "Valid | Invalid"
    formula_esplicita: |
      STEP 1: HTTP GET u
      STEP 2: Check status 200 OK
      STEP 3: Check content hash vs cache

  temporal_drift_v2:
    id: 10
    name: "Timeline Drift Detection"
    input: "Claim c al tempo t1 e t2"
    output: "Drift Score ∈ [0.0, 1.0]"
    formula_esplicita: |
      STEP 1: Estrai semantic embedding E(t1), E(t2)
      STEP 2: Drift = 1 - cosine_similarity(E(t1), E(t2))

  bias_detector_v3:
    id: 11
    name: "Bias Pattern Detection"
    input: "Testo T"
    output: "Bias Penalty ∈ [0.0, 1.0]"
    formula_esplicita: |
      STEP 1: Scan per confirmation_bias, apophenia, survivorship
      STEP 2: Assegna pesi (es. apophenia=0.4)
      STEP 3: Penalty = Σ pesi

  factoid_hash_v3:
    id: 12
    name: "Factoid Deduplication"
    input: "Factoid F"
    output: "Hash SHA-256"
    formula_esplicita: |
      STEP 1: Normalizza campi core (label, time_span, entities)
      STEP 2: Concatena stringhe
      STEP 3: Hash = SHA-256(stringa)

  syntropy_v1:
    id: 13
    name: "Syntropy — Ordine Emergente"
    input: "prior_distribution, posterior_distribution"
    output: "Sy ∈ [-1.0, 1.0]"
    formula_esplicita: |
      Sy = 1 - (H_post / H_prior)
      where H = Shannon entropy over representational distribution

  causal_graph_v2:
    id: 14
    name: "Causal Graph Engine"
    input: "Eventi E1..En"
    output: "DAG causal relations"
    formula_esplicita: "Bayesian network + temporal ordering. HALTED if cycle detected."

  neural_embedding_v2:
    id: 15
    name: "Neural Embedding Generator"
    input: "Factoid F"
    output: "Vector[128]"
    formula_esplicita: "Genera vector embedding per factoid; used by majorana and consensus."

  cross_cultural_linker_v1:
    id: 16
    name: "Cross-Cultural Linker"
    input: "Factoid F1, F2"
    output: "Link Validity"
    formula_esplicita: "Valida pattern trasversali a culture indipendenti (Test del Triangolo)."

  # ─── NUOVI MOTORI v3.0 (17-20) ───
  automated_source_linker_v1:
    id: 17
    name: "Automated Source Linker — IPFS/Filecoin CID Mapper"
    description: "Collega automaticamente i factoid [LACUNA_DATI] a fonti decentralizzate IPFS/Filecoin."
    input: "factoid_id con sources=[LACUNA_DATI], query_terms, dominio"
    output: "CID verificato | [LACUNA_DATI_PERSISTENTE] con log_id"
    formula_esplicita: |
      STEP 1: Estrai label e description dal factoid
      STEP 2: Costruisci query IPFS: "{label} {dominio} primary_source"
      STEP 3: Interroga IPFS DHT — max 3 tentativi, timeout 10s
      STEP 4: Se risposta CID:
              a. Verifica formato: /ipfs/Qm... o /ipfs/bafy...
              b. Verifica deal attivo su Filecoin (API status)
              c. Calcola UQ_delta: confronta metadati con factoid
      STEP 5: Se CID valido e UQ_delta < 0.15:
              → ipfs_cid = "ipfs://{CID}"
              → sources aggiornato
              → [LACUNA_DATI] rimosso
      STEP 6: Se nessun CID trovato dopo 3 tentativi:
              → sources = "[LACUNA_DATI_PERSISTENTE:{log_id}:{timestamp}]"

  superposition_v1:
    id: 18
    name: "Epistemic Superposition Engine"
    description: "Mantiene claim conflittuali in stato di sovrapposizione epistemica quantistica."
    input: "claim_A, claim_B, fonti_A[], fonti_B[], frame epistemico"
    output: "SUPERPOSITION_STATE | COLLAPSED_STATE con vincitore e log"
    formula_esplicita: |
      STEP 1: Calcola UQ_A = UQ_v6(claim_A, fonti_A)
      STEP 2: Calcola UQ_B = UQ_v6(claim_B, fonti_B)
      STEP 3: Calcola θ_AB = Majorana_θ_v4(vector_A, vector_B)
      STEP 4: Se θ_AB > 30°:
              → stato = SUPERPOSITION
              → quantum_state_flag = "superposition:{θ_AB:.2f}°"
      STEP 5: Ogni volta che nuova evidenza arriva:
              → Ricalcola θ_AB
              → Se θ_AB ≤ 30°: COLLAPSE verso claim con UQ maggiore
              → Se UQ_A ≈ UQ_B (|diff| < 0.05): richiede Guardian review
      STEP 6: Log ogni cambio di stato nel DAG

  si_calibration_v4:
    id: 19
    name: "Suppression Index Calibration Engine v4"
    description: "Estende SI_v3 con micro-clausole per domini controversi."
    input: "factoid con SI_score, dominio, cluster_id, IR, FD, RS"
    output: "SI_v4_score, micro_clause_id, SI_verdict"
    formula_esplicita: |
      STEP 1: Calcola SI_base = clamp((IR × FD) / RS, 0.0, 1.0)
      STEP 2: Applica micro-clausola se cluster in micro_clause_registry:
              → MC-001 (D6_AETHER): Se IR > 0.7 AND FD > 0.5 AND RS < 0.3 → TRUE_POSITIVE
              → MC-002 (preistoria Σ0-Σ2): SI sempre < 0.4
              → MC-003 (conoscenza indigena): FD da epistemicidio coloniale → TRUE_POSITIVE
      STEP 3: Se TRUE_POSITIVE: SI_v4 = SI_base, status = "soppressione_reale"
              Se FALSE_POSITIVE: SI_v4 = SI_base × 0.3, status = "artefatto_sistemico"
              Se REVIEW: SI_v4 = SI_base, status = "revisione_guardian"
    micro_clause_registry:
      MC-001: {name: "Energia di Frontiera", domain: "D6_AETHER"}
      MC-002: {name: "Preistoria Cognitiva", domain: "D1_PREHISTORY", stratum: ["Σ0","Σ1","Σ2"]}
      MC-003: {name: "Conoscenza Indigena", domain: "D_INDIGENOUS", frame: "indigenous"}

  deep_time_cognitive_v1:
    id: 20
    name: "Deep Time Cognitive Validation Engine"
    description: "Valida la dimensione cognitiva dei factoid nel periodo Σ0-Σ2."
    input: "factoid Σ0-Σ2, evidenza_materiale[], contesto_stratigrafico"
    output: "CCS ∈ [0.0, 1.0], cognitive_markers[], UQ_adjusted (max 0.70)"
    formula_esplicita: |
      STEP 1: Identifica cognitive markers presenti:
              - Planning_Depth (PD): 0-3
              - Symbolic_Thought (ST): 0-3
              - Language_Proxy (LP): 0-2
              - Working_Memory (WM): 0-2
      STEP 2: CCS_raw = (PD + ST + LP + WM) / 10.0
      STEP 3: Applica datation_uncertainty_penalty:
              Σ0 (>1M a.C.): penalty = 0.20
              Σ1 (1M-200k a.C.): penalty = 0.12
              Σ2 (200k-50k a.C.): penalty = 0.05
      STEP 4: CCS = clamp(CCS_raw - penalty, 0.0, 1.0)
      STEP 5: UQ_adjusted = min(UQ_v6_base, 0.70)
    casebook:
      olduvai_chopper:
        stratum: "Σ0"
        species: "Homo habilis"
        CCS: 0.00
        UQ_adjusted: 0.42
        verdict: "PROTO_COGNITIVO"
      wonderwerk_fire:
        stratum: "Σ1"
