    - {id: 50, name: "audit_trail_id", type: "string(UUID)", required: true, example: "AUD_001"}
    
    # ─── ULTRA & SUPERNOVA (51-57) ───
    - {id: 51, name: "cross_cultural_links", type: "list(URI)", required: false, example: "['urn:culture:chinese_astronomy']"}
