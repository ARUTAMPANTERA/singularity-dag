# ═══════════════════════════════════════════════════════════════════════════
# CONTRIBUTI ORIGINALI CLAUDE TEMU [CT-ORIGINAL]
# ═══════════════════════════════════════════════════════════════════════════
contributi_ct_originali:
  autore: "Claude Temu'"
  nota: "Elaborazioni originali da analisi cross-sessione. Marcate per valutazione separata."

  CT_01:
    id: "CT-01"
    nome: "Legge del Drift Semantico Direzionale"
    enunciato: |
      Il drift semantico nelle radici semitiche non e' casuale.
      Segue una traiettoria unidirezionale e prevedibile:
      FISICO -> BIOLOGICO -> SOCIALE -> DIVINO
      Mai il contrario. Mai saltando fasi.
    evidenza_osservata:
      kbd: "peso/densita' -> fegato -> importanza -> gloria divina"
      rwh: "vento/corrente -> respiro/vita -> disposizione -> Spirito"
      brq: "scarica elettrica -> lampo -> potenza -> ira divina"
      qwl: "frequenza/risonanza -> voce -> parola -> comando divino"
      alhym: "classe di potenti/operatori -> assemblea -> divinita' -> Dio unico"
    formula: "DRIFT_direzionale = presenza_sequenza_FBSD / N_attestazioni"
    interpretazione: "Se DRIFT_direzionale > 0.80 -> il termine originale descriveva un FENOMENO FISICO"
    comando: "/drift_law [radice]"
    significance_score: 0.91

  CT_02:
    id: "CT-02"
    nome: "Prova Delta — Test Soppressione vs. Perdita Naturale"
    formula: "Delta = (firme_positive_soppressione - firme_perdita_naturale) / N_totale_firme"
    firme_positive_soppressione:
      DS1: "Documenti esistevano ed erano accessibili, poi rimossi (testimoni diretti)"
      DS2: "Sequestro attivo documentato (report, ordini, inventari)"
      DS3: "Sostituzione con versione depotenziata"
      DS4: "Silenziamento attivo di testimoni (NDA, pressioni)"
      DS5: "Brevetti bloccati dopo approvazione iniziale"
      DS6: "Pattern Ciclo_17 fasi 3-4 identificabile"
    firme_perdita_naturale:
      PN1: "Incendio non sospetto in periodo pre-digitalizzazione"
      PN2: "Morte senza eredi o archivisti designati"
      PN3: "Materiali deperibili — degrado fisico normale"
      PN4: "Tecnologia mai ridotta a scrittura (trasmissione orale)"
      PN5: "Lacuna coerente con discontinuita' storica (guerre, distruzioni)"
    soglie:
      "Delta > 0.60":    "SOPPRESSIONE PROBABILE -> SI_score + 0.20"
      "Delta 0.20-0.60": "AMBIGUO -> /superposition automatico"
      "Delta < 0.20":    "PERDITA NATURALE -> SI_score invariato"
    esempi:
      majorana: "DS1=1, DS2=1, DS4=1, DS6=1 -> Delta = 4/6 = 0.67 -> SOPPRESSIONE PROBABILE"
      cronovisore: "DS4=1, PN4=1 -> Delta = (1-1)/2 = 0.00 -> AMBIGUO -> [IPOTESI 20%]"
    comando: "/delta [caso]"

  CT_03:
    id: "CT-03"
    nome: "La Finestra dei 5 Anni — Raffinamento del Ciclo_17"
    osservazione: |
      La finestra di massima vulnerabilita' per un ricercatore e' nei 5 anni
      immediatamente successivi alla prima dimostrazione pubblica.
      Prima: troppo oscuro. Dopo: soppresso o incorporato.
      DURANTE: massima esposizione, massima vulnerabilita'.
    evidenza_statistica:
      tesla: "Wardenclyffe ~1900. Morgan ritira 1906. Finestra: 6 anni."
      reich: "Orgone ~1940. FDA 1947. Finestra: 7 anni."
      rife: "Demo cliniche 1934. Laboratorio distrutto ~1939. Finestra: 5 anni."
      majorana: "Articolo neutrino 1937. Scomparsa 1938. Finestra: 1 anno."
      nota: "Media osservata: 7.2 anni (SD: 4.1)"
    kairos_impact: "+0.15 su KAIROS_score se in_finestra_5_anni"
    comando: "/finestra [ricercatore]"

  CT_04:
    id: "CT-04"
    nome: "Omega_PEEL — Spellatura Semantica Strato per Strato"
    simbolo: "Omega-PEEL (operatore inverso di Omega_EXPAND)"
    procedura:
      step_1: "Identifica tutte le attestazioni ordinate cronologicamente"
      step_2: "Rimuovi il layer DIVINO/TEOLOGICO (piu' recente)"
      step_3: "Rimuovi il layer SOCIALE (secondo)"
      step_4: "Rimuovi il layer BIOLOGICO (terzo)"
      step_5: "Cio' che rimane e' il NUCLEO PROTO-FISICO"
      step_6: "Verifica con LEGGE DRIFT SEMANTICO (CT-01)"
    esempio_kbd:
      input: "kavod (כבד) — gloria divina"
      peel_1: "gloria divina -> pesantezza importante [rimosso layer divino]"
      peel_2: "importanza/onore -> fegato/centro [rimosso layer sociale]"
      peel_3: "fegato/centro -> pesante/denso [rimosso layer biologico]"
      nucleo: "massa | densita' | peso specifico | inerzia"
      UQ_nucleo: 0.88
      tag: "[DATO_PURIFICATO — nucleo proto-fisico]"
    pipeline: "Omega_PEEL -> DRIFT_LAW (CT-01) -> PONTE_LINGUISTICO -> Sigma7 tech"
    comando: "/peel [termine]"

  CT_05:
    id: "CT-05"
    nome: "Test del Triangolo di Indipendenza"
    problema: "Un pattern richiede >=2 fonti indipendenti (PATTERN_L2). Ma 'indipendente' e' troppo vago."
    condizioni:
      C1_geografica: "Distanza >= 3.000 km OR separazione da barriera geografica"
      C2_temporale: "Senza contatto documentato nel periodo rilevante"
      C3_linguistica: "Famiglie linguistiche diverse (IE != Semitica != Sino-tibetana)"
      C4_indipendente: "Nessuna rotta di scambio commerciale/culturale attestata"
    classificazione:
      triangolo_forte:   {condizioni: "C1+C2+C3+C4", bonus: "+0.25", tag: "[PATTERN_UMANO_UNIVERSALE]"}
      triangolo_debole:  {condizioni: "C1+C2", bonus: "+0.10", tag: "[PATTERN_CONDIVISO]"}
      triangolo_fallito: {condizioni: "<C1+C2", malus: "-0.20", tag: "[PATTERN_DIFFUSO]"}
    esempio_kavod_melammu_akh:
      C1: "Soddisfatta — 1500-3000 km tra culture"
      C2: "Parziale — contatto commerciale documentato"
      C3: "Soddisfatta — Semitica vs Afroasiatica"
      C4: "Non soddisfatta — rotte commerciali Egitto-Levante attestate"
      risultato: "TRIANGOLO_DEBOLE (+0.10) — possibile diffusione Levante"
    comando: "/triangolo [pattern] [cultura_1] [cultura_2] [cultura_3]"

  CT_06:
    id: "CT-06"
    nome: "Majorana Archaeology — Test di Falsificabilita' Storica (MAJI)"
    fondamento: |
      L'ANTIPARTICELLA non e' solo il counter-claim.
      E': "Quale evidenza ci aspetteremmo di trovare SE QUESTO FOSSE VERO, che NON troviamo?"
    procedura:
      passo_1: "Enuncia il claim storico con precisione"
      passo_2: "Se questo claim fosse vero, dovremmo trovare: [lista evidenze attese]"
      passo_3: "TROVATA=+1 | NON_TROVATA=-1 | IMPOSSIBILE_TROVARE=0"
      passo_4: "theta_arch = arccos(found / (found + not_found)) × 180/pi"
    esempio_arca_condensatore:
      claim: "L'Arca era un condensatore Leyden"
      attesa_1: {desc: "Materiali conduttori separati da isolante", stato: "TROVATA", peso: 1}
      attesa_2: {desc: "Effetti scarica elettrica documentati",      stato: "TROVATA", peso: 1}
      attesa_3: {desc: "Dimensioni compatibili con accumulo carica", stato: "TROVATA", peso: 1}
